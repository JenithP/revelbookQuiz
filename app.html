<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>말씀 암기 훈련</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold-light:#e8cc80;
  --deep:#0d0a1a;--deep2:#130f24;--deep3:#1c1535;
  --purple:#4a3b8c;--purple-light:#7b6abf;--purple-bright:#9d8fe0;
  --teal:#2a8c7a;--teal-light:#4dbda8;
  --amber:#c97d2a;--amber-light:#e8a84c;
  --text:#f0ece0;--text-dim:#9e96b8;--text-muted:#5a5275;
  --card-bg:#13102a;--card-border:rgba(255,255,255,.07);
  --success:#4dbda8;--error:#e07070;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Pretendard',sans-serif;
  background:var(--deep);color:var(--text);
  display:flex;flex-direction:column;
  max-width:420px;margin:0 auto;
  height:100vh;position:relative;
}

/* 헤더 */
.header{
  background:var(--deep2);border-bottom:1px solid var(--card-border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.header-back{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--card-border);border-radius:8px;
  color:var(--text-dim);font-size:16px;cursor:pointer;text-decoration:none;flex-shrink:0;
}
.header-info{flex:1;min-width:0}
.header-chapter{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-stage{font-size:11px;color:var(--text-dim);margin-top:1px}
.stage-dots{display:flex;gap:3px;flex-shrink:0}
.dot{width:18px;height:5px;border-radius:3px;background:var(--deep3);transition:.3s}
.dot.done{background:var(--teal)}
.dot.active{background:var(--purple-bright)}

/* 통계 바 */
.stat-bar{
  display:flex;gap:6px;padding:8px 16px;
  background:var(--deep2);border-bottom:1px solid var(--card-border);flex-shrink:0;
}
.stat-item{
  flex:1;background:var(--card-bg);border-radius:8px;padding:5px;text-align:center;
}
.stat-num{font-size:15px;font-weight:600;color:var(--text)}
.stat-label{font-size:10px;color:var(--text-muted);margin-top:1px}

/* 구절 탭 */
.verse-tabs{
  display:flex;overflow-x:auto;
  background:var(--deep2);border-bottom:1px solid var(--card-border);flex-shrink:0;
  scrollbar-width:none;
}
.verse-tabs::-webkit-scrollbar{display:none}
.vtab{
  flex-shrink:0;padding:7px 12px;font-size:12px;font-weight:500;
  color:var(--text-muted);border:none;background:none;cursor:pointer;
  border-bottom:2px solid transparent;transition:.2s;white-space:nowrap;
}
.vtab.active{color:var(--purple-bright);border-bottom-color:var(--purple-bright)}
.vtab.mastered{color:var(--teal)}

/* 스테이지 탭 */
.stage-tabs{
  display:flex;overflow-x:auto;gap:0;
  padding:8px 12px;background:var(--deep2);
  border-bottom:1px solid var(--card-border);flex-shrink:0;
  scrollbar-width:none;
}
.stage-tabs::-webkit-scrollbar{display:none}
.stab{
  flex-shrink:0;padding:5px 10px;border-radius:20px;font-size:12px;
  border:1px solid var(--card-border);background:none;
  color:var(--text-muted);cursor:pointer;transition:.2s;white-space:nowrap;margin-right:4px;
}
.stab.active{background:var(--purple);border-color:var(--purple);color:#fff}
.stab.done{border-color:var(--teal);color:var(--teal)}
.stab.locked{opacity:.3;cursor:not-allowed}

/* 스크롤 영역 */
.scroll-area{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--deep3) transparent;}
.scroll-area::-webkit-scrollbar{width:3px}
.scroll-area::-webkit-scrollbar-thumb{background:var(--deep3);border-radius:2px}

/* 공통 카드 */
.card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:14px;padding:14px;margin:12px 14px 0;
}
.card-label{font-size:11px;color:var(--text-muted);margin-bottom:8px;letter-spacing:.3px}

/* 이모지 영역 */
.emoji-row{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  padding:14px;
}
.emoji-item{text-align:center;transition:.3s}
.emoji-icon{
  width:52px;height:52px;border-radius:12px;font-size:26px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  transition:.3s;
}
.emoji-item.active .emoji-icon{
  background:rgba(127,107,200,.25);border-color:var(--purple-bright);
}
.emoji-item.dim .emoji-icon{opacity:.2}
.emoji-item.correct .emoji-icon{
  background:rgba(45,140,120,.2);border-color:var(--teal);
}
.emoji-label{font-size:9px;color:var(--text-muted);margin-top:4px;transition:.3s}
.emoji-item.active .emoji-label{color:var(--purple-bright)}
.emoji-item.correct .emoji-label{color:var(--teal-light)}

@keyframes blink{0%,100%{opacity:1;border-color:var(--purple-bright)}50%{opacity:.4;border-color:transparent}}
.emoji-item.blinking .emoji-icon{animation:blink 1s ease-in-out infinite}

/* 구절 텍스트 표시 */
.verse-line{margin-bottom:10px;font-size:14px;line-height:2}
.vnum{
  display:inline-block;font-size:10px;color:var(--text-muted);
  background:var(--deep3);border-radius:4px;padding:1px 5px;margin-right:5px;
  vertical-align:middle;
}
.chunk-highlight{color:var(--gold-light);font-weight:600}
.chunk-dim{color:var(--text-muted)}

/* 빈칸 — 글자수만큼 너비 */
.blank-input{
  display:inline-block;vertical-align:middle;
  background:rgba(74,59,140,.15);
  border:none;border-bottom:1.5px solid var(--purple-bright);
  color:var(--text);font-size:14px;font-family:'Pretendard',sans-serif;
  outline:none;padding:0 2px;margin:0 2px;
  border-radius:0;transition:.3s;
  min-width:20px;
}
.blank-input:focus{background:rgba(74,59,140,.25);border-bottom-color:var(--gold)}
.blank-input.correct{border-bottom-color:var(--teal);color:var(--teal-light);background:rgba(45,140,120,.1)}
.blank-input.wrong{border-bottom-color:var(--error);color:var(--error);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* 청크 빈칸 (3단계) */
.chunk-blank-input{
  width:100%;background:var(--deep3);
  border:1px solid var(--purple-bright);border-radius:8px;
  color:var(--text);font-size:14px;font-family:'Pretendard',sans-serif;
  outline:none;padding:8px 10px;margin-top:6px;line-height:1.7;
  min-height:36px;
}
.chunk-blank-input:focus{border-color:var(--gold);background:rgba(74,59,140,.1)}
.chunk-blank-input.correct{border-color:var(--teal);background:rgba(45,140,120,.08);color:var(--teal-light)}
.chunk-blank-input.wrong{border-color:var(--error);animation:shake .3s ease}

/* 절 타이핑 (4단계) */
.verse-block{margin-bottom:14px}
.verse-block-label{
  font-size:12px;font-weight:600;color:var(--text-dim);
  margin-bottom:6px;display:flex;align-items:center;gap:6px;
}
.verse-block-emojis{display:flex;gap:4px;flex-wrap:wrap}
.mini-emoji{
  width:26px;height:26px;font-size:14px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);
  transition:.3s;
}
.mini-emoji.blinking{animation:blink 1s ease-in-out infinite}
.mini-emoji.correct{background:rgba(45,140,120,.15);border-color:var(--teal);animation:none}

.verse-textarea{
  width:100%;background:var(--deep3);
  border:1px solid var(--card-border);border-radius:10px;
  color:var(--text);font-size:14px;font-family:'Pretendard',sans-serif;
  outline:none;padding:10px 12px;line-height:1.8;resize:none;
  min-height:60px;max-height:120px;overflow-y:auto;
}
.verse-textarea:focus{border-color:var(--purple-bright)}
.verse-textarea.correct{border-color:var(--teal);background:rgba(45,140,120,.05);color:var(--teal-light)}
.verse-textarea.wrong{border-color:var(--error);animation:shake .3s ease}
.verse-answer-show{
  font-size:13px;line-height:1.8;color:var(--text-dim);
  background:rgba(0,0,0,.2);border-radius:8px;padding:8px 10px;margin-top:6px;
  display:none;
}

/* 5단계 전체 타이핑 */
.full-verse-block{margin-bottom:10px}
.full-vnum{font-size:12px;font-weight:600;color:var(--gold);margin-bottom:4px}
.full-verse-text{
  font-size:13px;color:var(--text-dim);line-height:1.8;
  background:rgba(0,0,0,.2);border-radius:8px;padding:8px 10px;
  margin-bottom:6px;
}
.full-input{
  width:100%;background:var(--deep3);
  border:1px solid var(--card-border);border-radius:10px;
  color:var(--text);font-size:14px;font-family:'Pretendard',sans-serif;
  outline:none;padding:10px 12px;line-height:1.8;resize:none;
  min-height:50px;
}
.full-input:focus{border-color:var(--purple-bright)}
.full-input.correct{border-color:var(--teal);background:rgba(45,140,120,.05);color:var(--teal-light)}
.full-input.wrong{border-color:var(--error);animation:shake .3s ease}

/* 피드백 */
.feedback{
  border-radius:10px;padding:10px 12px;margin:10px 14px 0;
  font-size:13px;line-height:1.6;display:none;
}
.feedback.correct{background:rgba(45,140,120,.15);border:1px solid rgba(45,140,120,.3);color:var(--teal-light)}
.feedback.partial{background:rgba(200,125,42,.15);border:1px solid rgba(200,125,42,.3);color:var(--amber-light)}
.feedback.wrong{background:rgba(200,100,100,.12);border:1px solid rgba(200,100,100,.25);color:var(--error)}

/* 진행 표시 */
.progress-info{
  text-align:center;font-size:12px;color:var(--text-muted);
  padding:8px;
}
.progress-dots{display:flex;gap:4px;justify-content:center;margin-top:4px}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--deep3);transition:.3s}
.pdot.done{background:var(--teal)}
.pdot.current{background:var(--purple-bright)}

/* TTS 바 */
.tts-bar{
  background:var(--deep2);border-top:1px solid var(--card-border);
  padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.tts-play{
  width:36px;height:36px;border-radius:50%;background:var(--purple);border:none;
  color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.tts-track{flex:1;height:3px;background:var(--deep3);border-radius:2px;cursor:pointer}
.tts-fill{height:100%;background:var(--purple-bright);border-radius:2px;width:0%;transition:.1s}
.tts-speed{
  background:var(--deep3);border:none;color:var(--text-dim);
  font-size:11px;border-radius:6px;padding:3px 6px;cursor:pointer;
}

/* 하단 버튼 */
.bottom-nav{
  background:var(--deep2);border-top:1px solid var(--card-border);
  padding:10px 14px;display:flex;gap:8px;flex-shrink:0;
}
.btn-prev{
  flex:1;padding:11px;border-radius:10px;
  border:1px solid var(--card-border);background:none;
  color:var(--text-dim);font-size:13px;cursor:pointer;
  font-family:'Pretendard',sans-serif;
}
.btn-prev:disabled{opacity:.35;cursor:not-allowed}
.btn-replay{
  flex:1;padding:11px;border-radius:10px;
  background:rgba(201,168,76,0.15);
  border:1px solid rgba(201,168,76,0.4);
  color:#C9A84C;font-size:13px;cursor:pointer;
  font-family:'Pretendard',sans-serif;transition:.2s;
}
.btn-replay:hover{background:rgba(201,168,76,0.25)}
.btn-main{
  flex:2;padding:11px;border-radius:10px;
  background:var(--purple);border:none;
  color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;
  font-family:'Pretendard',sans-serif;
}
.btn-main:hover{background:var(--purple-light)}
.btn-main.gold{background:linear-gradient(135deg,var(--gold),#a07830);color:#1a1200}
.btn-main:disabled{opacity:.4;cursor:not-allowed}

/* 완료 */
.complete-screen{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 24px;text-align:center;
}
.complete-icon{font-size:52px;margin-bottom:16px}
.complete-title{font-family:'Nanum Myeongjo',serif;font-size:22px;color:var(--gold-light);margin-bottom:8px}

/* 1단계 씬 */
.scene-bg{
  background:linear-gradient(180deg,#0d1b3e 0%,#1a1040 100%);
  border-radius:14px;padding:20px 14px;margin:12px 14px 0;
  display:flex;flex-direction:column;align-items:center;
  position:relative;overflow:hidden;min-height:160px;justify-content:center;
}
.scene-glow{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:200px;height:80px;
  background:radial-gradient(ellipse,rgba(74,59,140,.4) 0%,transparent 70%);
}
.scene-img-wrap{
  position:relative;z-index:1;
  display:flex;align-items:center;justify-content:center;
  width:100%;min-height:140px;
}
.scene-img{
  width:140px;height:140px;object-fit:contain;
  transition:opacity 0.3s ease;
  filter:drop-shadow(0 4px 12px rgba(201,168,76,0.3));
  opacity:1;
}
.scene-img.fade{
  opacity:0;
  transition:opacity 0.2s ease;
}
.scene-fallback{
  font-size:60px;text-align:center;line-height:1;
  filter:drop-shadow(0 4px 12px rgba(201,168,76,0.3));
  transition:opacity 0.3s ease;opacity:1;
}
.scene-fallback.fade{opacity:0;transition:opacity 0.2s ease}
.scene-chunk{
  position:relative;z-index:1;
  background:rgba(0,0,0,.5);border:1px solid rgba(255,255,255,.08);
  border-radius:10px;padding:12px 16px;text-align:center;
  font-size:15px;line-height:1.8;color:var(--text);margin-top:14px;
  max-width:340px;width:100%;
}
.scene-note{font-size:11px;color:var(--text-muted);margin-top:6px}

/* 1단계 — PNG 레이어 씬 */
.scene-stage{
  position:relative;
  width:calc(100% - 28px);
  height:220px;
  background:linear-gradient(180deg,#0d1b3e 0%,#1a1040 100%);
  border-radius:14px;
  overflow:hidden;
  margin:12px 14px 0;
}
.scene-actor{
  position:absolute;
  transform:translate(-50%,-50%);
  object-fit:contain;
  filter:drop-shadow(0 4px 16px rgba(201,168,76,0.2));
  transition:opacity 0.6s ease, filter 0.6s ease, left 0.6s ease, top 0.6s ease, width 0.6s ease, height 0.6s ease;
  pointer-events:none;
}
@keyframes fadeUp{
  from{opacity:0;transform:translate(-50%,-40%)}
  to{opacity:1;transform:translate(-50%,-50%)}
}
@keyframes slideLeft{
  from{opacity:0;transform:translate(-30%,-50%)}
  to{opacity:1;transform:translate(-50%,-50%)}
}
@keyframes slideRight{
  from{opacity:0;transform:translate(-70%,-50%)}
  to{opacity:1;transform:translate(-50%,-50%)}
}
@keyframes dropIn{
  from{opacity:0;transform:translate(-50%,-70%)}
  to{opacity:1;transform:translate(-50%,-50%)}
}
@keyframes flyIn{
  from{opacity:0;transform:translate(-30%,-70%) scale(0.7)}
  to{opacity:1;transform:translate(-50%,-50%) scale(1)}
}

/* 2단계 — 타원형 말풍선 */
.word-bubble{
  display:inline-block;
  border:2px solid var(--purple-bright);
  border-radius:50px;
  padding:2px 12px;
  background:rgba(157,143,224,0.15);
  vertical-align:middle;
  margin:0 2px;
  transition:border-color .2s, background .2s;
}
.word-bubble.wrong{
  border-color:var(--error);
  background:rgba(224,112,112,0.18);
}
.word-bubble.correct{
  border-color:var(--teal);
  background:rgba(45,140,120,0.15);
}
.bubble-text{display:inline-block}
.word-bubble.blinking .bubble-text{
  animation:bubbleBlink 2s ease-out infinite;
}
@keyframes bubbleBlink{
  0%{opacity:0}
  60%{opacity:1}
  95%{opacity:1}
  96%{opacity:0}
  100%{opacity:0}
}

/* 2단계 — 그림 힌트 토글 */
.hint-toggle{
  display:block;
  margin:8px 14px 0;
  padding:9px 14px;
  border-radius:10px;
  border:1px solid var(--card-border);
  background:rgba(201,168,76,0.10);
  color:var(--gold-light);
  font-size:13px;font-weight:500;
  font-family:'Pretendard',sans-serif;
  cursor:pointer;
  width:calc(100% - 28px);
  transition:background .2s, border-color .2s;
}
.hint-toggle:hover{background:rgba(201,168,76,0.22)}
.hint-toggle.on{background:rgba(201,168,76,0.25);border-color:var(--gold)}

/* 2단계 — 절 그룹 (전체 장 표시) */
.s2-verse-group{
  margin-bottom:14px;
  padding-bottom:10px;
  border-bottom:1px solid var(--card-border);
}
.s2-verse-group:last-child{
  margin-bottom:0;
  padding-bottom:0;
  border-bottom:none;
}
.s2-vnum{
  font-size:12px;font-weight:600;color:var(--gold);
  margin-bottom:6px;
}
.s2-verse-text{
  font-size:14px;line-height:2.4;color:var(--text);
}
.bubble-input{
  border:none;background:transparent;outline:none;
  font-size:14px;font-family:'Pretendard',sans-serif;
  color:var(--text);text-align:center;padding:0;
}
.bubble-input.correct{color:var(--teal-light)}
.bubble-input.wrong{animation:shake 0.3s ease;color:var(--error)}
.bubble-input:disabled{color:var(--teal-light);opacity:1}

/* 복습 배너 */
.review-banner{
  position:fixed;top:50%;left:50%;
  font-size:32px;font-weight:700;color:var(--gold-light);
  background:rgba(13,10,26,0.95);
  border:2px solid var(--gold);border-radius:20px;
  padding:20px 40px;z-index:1000;pointer-events:none;
  box-shadow:0 8px 32px rgba(201,168,76,0.4);
  animation:bannerPop 1s ease forwards;
}
@keyframes bannerPop{
  0%{transform:translate(-50%,-50%) scale(0.5);opacity:0}
  20%{transform:translate(-50%,-50%) scale(1.1);opacity:1}
  80%{transform:translate(-50%,-50%) scale(1);opacity:1}
  100%{transform:translate(-50%,-50%) scale(0.9);opacity:0}
}

/* 라운드 점 */
.round-dots{display:flex;gap:6px;justify-content:center;margin-top:6px}
.round-dot{width:8px;height:8px;border-radius:50%;background:var(--deep3);transition:.3s}
.round-dot.done{background:var(--teal)}
.round-dot.current{background:var(--purple-bright)}

/* 2단계 안내 텍스트 */
.s2-guide{
  text-align:center;font-size:13px;padding:8px 14px;
  color:var(--purple-bright);
}
.s2-guide.input-mode{color:var(--gold-light)}

/* 스페이서 */
.spacer{height:14px}
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="header-back">‹</a>
  <div class="header-info">
    <div class="header-chapter" id="hd-chapter">계 1장 1~3절</div>
    <div class="header-stage" id="hd-stage">① 연상 학습</div>
  </div>
  <div class="stage-dots" id="stage-dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<div class="stat-bar">
  <div class="stat-item"><div class="stat-num" id="s-streak">0</div><div class="stat-label">연속정답</div></div>
  <div class="stat-item"><div class="stat-num" id="s-mastered">0</div><div class="stat-label">완전암기</div></div>
  <div class="stat-item"><div class="stat-num" id="s-correct">0</div><div class="stat-label">이번정답</div></div>
  <div class="stat-item"><div class="stat-num" id="s-stage">1/5</div><div class="stat-label">단계</div></div>
</div>

<div class="verse-tabs" id="verse-tabs"></div>
<div class="stage-tabs" id="stage-tabs"></div>

<div class="scroll-area" id="scroll-area"></div>
<div class="feedback" id="feedback"></div>

<div class="tts-bar" id="tts-bar" style="display:none">
  <button class="tts-play" id="tts-btn" onclick="toggleTTS()">▶</button>

/* 절 단위 그룹핑 */
function getVerseGroups(v) {
  const groups = [];
  let cur = null;
  v.chunks.forEach(ch => {
    if (ch.verseNum) { cur = {verseNum:ch.verseNum, chunks:[]}; groups.push(cur); }
    if (cur) cur.chunks.push(ch);
  });
  return groups;
}

/* Firebase 점수 로드 */
async function loadScores() {
  if (S.user.isGuest) { renderAll(); return; }
  try {
    const snap = await getDoc(doc(db,'scores',S.user.uid));
    if (snap.exists()) {
      S.scores = snap.data();
      Object.keys(S.scores).forEach(k => { if (S.scores[k]?.mastered) S.mastered.add(k); });
    }
  } catch(e){}
  renderAll();
}
loadScores();

async function saveScore(verseId, data) {
  if (!S.user || S.user.isGuest) return;
  try {
    S.scores[verseId] = {...(S.scores[verseId]||{}), ...data};
    await setDoc(doc(db,'scores',S.user.uid), {[verseId]: {...S.scores[verseId], updatedAt:serverTimestamp()}}, {merge:true});
    if (data.mastered) {
      await setDoc(doc(db,'leaderboard',S.user.uid), {
        name:S.user.name, group:S.user.group,
        totalMastered: S.mastered.size,
        updatedAt: serverTimestamp()
      }, {merge:true});
    }
  } catch(e){}
}

/* ═══════════════════════════════════════
   유틸
═══════════════════════════════════════ */
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
// 글자수 기반 input 너비 계산 (한글 1글자 ≈ 1em)
function charWidth(word) {
  return Math.max(word.length, 2) + 'em';
}
function normalize(s) { return s.trim().replace(/\s+/g,' '); }

/* ═══════════════════════════════════════
   공통 UI 렌더
═══════════════════════════════════════ */
function renderAll() {
  renderVerseTabs();
  renderStageTabs();
  updateHeader();
  updateStats();
  renderStage();
}

function renderVerseTabs() {
  document.getElementById('verse-tabs').innerHTML = VERSES.map((v,i) =>
    `<button class="vtab${i===S.verseIdx?' active':''}${S.mastered.has(v.id)?' mastered':''}"
      onclick="selectVerse(${i})">${v.shortLabel}</button>`
  ).join('');
}

function renderStageTabs() {
  const labels = ['①연상','②단어','③청크','④절','⑤전체'];
  document.getElementById('stage-tabs').innerHTML = labels.map((l,i) => {
    let cls='stab';
    if (!S.stageUnlocked[i]) cls+=' locked';
    else if (i===S.stageIdx) cls+=' active';
    else if (S.scores[VERSES[S.verseIdx].id]?.['stage'+(i+1)+'done']) cls+=' done';
    return `<button class="${cls}" onclick="selectStage(${i})">${l}</button>`;
  }).join('');
}

function updateHeader() {
  const v = VERSES[S.verseIdx];
  const names=['연상 학습','단어 채우기','청크 채우기','절 채우기','전체 암기'];
  document.getElementById('hd-chapter').textContent = v.title;
  document.getElementById('hd-stage').textContent = `${'①②③④⑤'[S.stageIdx]} ${names[S.stageIdx]}`;
  document.querySelectorAll('.dot').forEach((d,i)=>{
    d.classList.remove('active','done');
    if(i<S.stageIdx) d.classList.add('done');
    else if(i===S.stageIdx) d.classList.add('active');
  });
}

function updateStats() {
  document.getElementById('s-streak').textContent = S.streak;
  document.getElementById('s-mastered').textContent = S.mastered.size;
  document.getElementById('s-correct').textContent = S.stageCorrect;
  document.getElementById('s-stage').textContent = (S.stageIdx+1)+'/5';
}

function showFeedback(type, msg) {
  const fb = document.getElementById('feedback');
  fb.className = 'feedback ' + type;
  fb.textContent = msg;
  fb.style.display = 'block';
  if (type==='correct') setTimeout(()=>{fb.style.display='none';}, 1500);
}
function hideFeedback() { document.getElementById('feedback').style.display='none'; }

/* ═══════════════════════════════════════
   선택 핸들러
═══════════════════════════════════════ */
window.selectVerse = function(i) {
  stopTTS();
  S.verseIdx=i; S.stageIdx=0; S.stageCorrect=0; S.streak=0;
  S.stageUnlocked=[true,true,false,false,false];
  hideFeedback();
  renderAll();
};

window.selectStage = function(i) {
  if(!S.stageUnlocked[i]) return;
  stopTTS();
  S.stageIdx=i; S.stageCorrect=0;
  hideFeedback();
  initStage();
  renderStageTabs(); updateHeader(); updateStats(); renderStage();
};

function initStage() {
  const v = VERSES[S.verseIdx];
  if (S.stageIdx===1) {
    S.s2_totalRounds = 0;
    S.s2_targetRounds = 3;
    S.s2_blankIndices = [];
    S.s2_hintVisible = false;
    S.s2_hintChunkIdx = -1;
    nextS2();
  } else if (S.stageIdx===2) {
    S.s3_queue = shuffle(v.chunks.map((_,i)=>i));
    S.s3_correct=0; S.s3_target=4;
    S.s3_curChunkIdx=-1;
    S.s3_hintVisible = false;
    nextS3();
  } else if (S.stageIdx===3) {
    S.s4_verseGroups = getVerseGroups(v);
    S.s4_groupIdx=0; S.s4_done=new Set();
  } else if (S.stageIdx===4) {
    S.s5_done=new Set();
  }
}

function nextS2() {
  const v = VERSES[S.verseIdx];
  const groups = getVerseGroups(v);
  const blanks = [];
  // 라운드가 진행될수록 각 절마다 +2 (라운드1:2, 라운드2:4, 라운드3:6)
  // 짧은 절은 보유 단어 수까지만 (자연스럽게 하나만 늘기도 함)
  const desired = 2 + S.s2_totalRounds * 2;
  groups.forEach(g => {
    const groupWords = [];
    g.chunks.forEach(ch => {
      const ci = v.chunks.indexOf(ch);
      ch.text.split(' ').forEach((_, wi) => {
        groupWords.push({ ci, wi });
      });
    });
    const count = Math.min(groupWords.length, desired);
    blanks.push(...shuffle(groupWords).slice(0, count));
  });
  S.s2_blankIndices = blanks;
  S.s2_roundCorrect = 0;
  S.s2_hintPhase = true;
  // 힌트 씬은 첫 번째 빈칸의 청크부터 시작
  S.s2_hintChunkIdx = blanks.length > 0 ? blanks[0].ci : -1;
}

function nextS3() {
  const v = VERSES[S.verseIdx];
  if (S.s3_queue.length===0) S.s3_queue = shuffle(v.chunks.map((_,i)=>i));
  S.s3_curChunkIdx = S.s3_queue.shift();
  S.s3_hintPhase = true; // 각 청크는 힌트 페이즈로 시작
}

/* ═══════════════════════════════════════
   메인 렌더 분기
═══════════════════════════════════════ */
function renderStage() {
  const area = document.getElementById('scroll-area');
  const inStage1 = S.stageIdx===0;
  document.getElementById('tts-bar').style.display = inStage1 ? 'flex' : 'none';
  document.getElementById('btn-prev').style.display = inStage1 ? 'flex' : 'none';
  document.getElementById('btn-replay').style.display = inStage1 ? 'flex' : 'none';
  // 2단계 힌트 phase에서 숨겼던 btn-main 기본 복원 (각 stage 함수에서 다시 제어 가능)
  document.getElementById('btn-main').style.display = '';

  if (S.stageIdx===0) renderStage1(area);
  else if (S.stageIdx===1) renderStage2(area);
  else if (S.stageIdx===2) renderStage3(area);
  else if (S.stageIdx===3) renderStage4(area);
  else renderStage5(area);
}

/* ═══════════════════════════════════════
   1단계 — PNG 레이어 애니메이션 씬 + TTS
   청크 이동 시 이전 액터 완전 제거 후 새 씬 등장
═══════════════════════════════════════ */
function renderStage1(area) {
  const v = VERSES[S.verseIdx];
  const chunk = v.chunks[S.chunkIdx];
  const isLast = S.chunkIdx === v.chunks.length-1;
  const isFirst = S.chunkIdx === 0;

  const allText = v.chunks.map((ch,ci) => {
    const cls = ci===S.chunkIdx ? 'chunk-highlight' : 'chunk-dim';
    return `${ch.verseNum?`<span class="vnum">${ch.verseNum}</span>`:''}<span class="${cls}">${ch.text}</span>`;
  }).join(' ');

  const dotsHtml = v.chunks.map((_,i) =>
    `<div class="pdot${i<S.chunkIdx?' done':i===S.chunkIdx?' current':''}"></div>`
  ).join('');

  area.innerHTML = `
    <div class="scene-stage" id="scene-stage"></div>
    <div class="card" style="margin-top:10px">
      <div class="card-label">전체 구절</div>
      <div style="font-size:13px;line-height:2;color:var(--text-dim)">${allText}</div>
    </div>
    <div class="progress-info">
      ${S.chunkIdx+1} / ${v.chunks.length}
      <div class="progress-dots">${dotsHtml}</div>
    </div>
    <div class="spacer"></div>`;

  renderScene(chunk);

  prepareTTS(chunk.text);
  document.getElementById('btn-prev').disabled = isFirst;
  document.getElementById('btn-main').textContent = isLast ? '다음 단계 →' : '다음 ▶';
  document.getElementById('btn-main').className = isLast ? 'btn-main gold' : 'btn-main';
}

/* PNG 레이어 씬 렌더 — 매 청크마다 stage 초기화 후 새 액터 애니메이션 등장 */
function renderScene(chunk) {
  const stage = document.getElementById('scene-stage');
  if (!stage) return;

  stage.innerHTML = ''; // 이전 청크 액터 완전 제거

  if (!chunk.scene) return;

  chunk.scene.forEach(actor => {
    const img = document.createElement('img');
    img.className = 'scene-actor';
    img.src = `/images/${actor.img}`;
    img.alt = '';
    img.style.left = actor.x;
    img.style.top = actor.y;
    img.style.width = actor.size + 'px';
    img.style.height = actor.size + 'px';
    img.style.opacity = '0';
    // moveTo는 이전 액터가 없으므로 fadeUp 으로 fallback
    const animName = (actor.anim === 'moveTo') ? 'fadeUp' : actor.anim;
    img.style.animation = `${animName} 0.6s ease ${actor.delay || 0}s forwards`;
    img.onerror = () => { img.style.display = 'none'; };
    stage.appendChild(img);
  });
}

/* ═══════════════════════════════════════
   2단계 — 전체 장(chapter) 한 번에 표시
   힌트 5초간 빈칸 자리에 단어가 fade-in/sudden-disappear 반복
   → 입력 phase 전환 → 모두 정답 → 라운드 완료
   3 라운드 완료 시 3단계 잠금 해제
═══════════════════════════════════════ */
function renderStage2(area) {
  const v = VERSES[S.verseIdx];
  const groups = getVerseGroups(v);
  const blankSet = new Set(S.s2_blankIndices.map(b => `${b.ci}-${b.wi}`));

  // 절(verseNum) 단위로 묶어서 표시
  const groupsHtml = groups.map(g => {
    const versesText = g.chunks.map(ch => {
      const ci = v.chunks.indexOf(ch);
      const words = ch.text.split(' ');
      return words.map((w, wi) => {
        if (blankSet.has(`${ci}-${wi}`)) {
          if (S.s2_hintPhase) {
            return `<span class="word-bubble blinking" data-ci="${ci}" data-wi="${wi}">` +
              `<span class="bubble-text">${w}</span></span>`;
          }
          return `<span class="word-bubble" data-ci="${ci}" data-wi="${wi}">` +
            `<input class="bubble-input" type="text" data-ci="${ci}" data-wi="${wi}" ` +
            `style="width:${charWidth(w)}" ` +
            `autocomplete="off" autocorrect="off" spellcheck="false"></span>`;
        }
        return `<span>${w}</span>`;
      }).join(' ');
    }).join(' ');

    return `<div class="s2-verse-group">
      <div class="s2-vnum">${g.verseNum}</div>
      <div class="s2-verse-text">${versesText}</div>
    </div>`;
  }).join('');

  // 라운드 진행 점
  let dotsHtml = '';
  for (let i = 0; i < S.s2_targetRounds; i++) {
    let cls = 'round-dot';
    if (i < S.s2_totalRounds) cls += ' done';
    else if (i === S.s2_totalRounds) cls += ' current';
    dotsHtml += `<div class="${cls}"></div>`;
  }

  const guideHtml = S.s2_hintPhase
    ? `<div class="s2-guide" id="s2-guide">👀 깜빡이는 단어를 외운 뒤 [도전!] 을 누르세요</div>`
    : `<div class="s2-guide input-mode" id="s2-guide">빈칸을 채워주세요 ✏️</div>`;

  const sceneHtml = S.s2_hintVisible
    ? `<div class="scene-stage" id="scene-stage"></div>`
    : '';
  const toggleHtml = `<button class="hint-toggle${S.s2_hintVisible?' on':''}" type="button" onclick="toggleS2Hint()">${S.s2_hintVisible?'🙈 그림 가리기':'💡 그림 힌트 보기'}</button>`;

  area.innerHTML = `
    ${sceneHtml}
    ${toggleHtml}
    <div class="card" style="margin-top:8px">
      ${groupsHtml}
    </div>
    ${guideHtml}
    <div class="progress-info">
      라운드 ${S.s2_totalRounds + 1}/${S.s2_targetRounds}
      <div class="round-dots">${dotsHtml}</div>
    </div>
    <div class="spacer"></div>`;

  if (S.s2_hintVisible && S.s2_hintChunkIdx >= 0) {
    renderScene(v.chunks[S.s2_hintChunkIdx]);
  }

  const btn = document.getElementById('btn-main');
  btn.style.display = '';
  if (S.s2_hintPhase) {
    btn.textContent = '도전! ✨';
    btn.className = 'btn-main gold';
  } else {
    btn.textContent = '확인';
    btn.className = 'btn-main';
    setupS2InputHandlers();
  }
}

window.toggleS2Hint = function() {
  S.s2_hintVisible = !S.s2_hintVisible;
  const toggleBtn = document.querySelector('.hint-toggle');
  if (S.s2_hintVisible) {
    let stage = document.getElementById('scene-stage');
    if (!stage) {
      stage = document.createElement('div');
      stage.className = 'scene-stage';
      stage.id = 'scene-stage';
      const area = document.getElementById('scroll-area');
      // 토글 버튼 위에 삽입
      area.insertBefore(stage, area.firstChild);
    }
    const v = VERSES[S.verseIdx];
    const ci = S.s2_hintChunkIdx >= 0 ? S.s2_hintChunkIdx
             : (S.s2_blankIndices[0]?.ci ?? 0);
    S.s2_hintChunkIdx = ci;
    renderScene(v.chunks[ci]);
    if (toggleBtn) {
      toggleBtn.textContent = '🙈 그림 가리기';
      toggleBtn.classList.add('on');
    }
  } else {
    const stage = document.getElementById('scene-stage');
    if (stage) stage.remove();
    if (toggleBtn) {
      toggleBtn.textContent = '💡 그림 힌트 보기';
      toggleBtn.classList.remove('on');
    }
  }
};

function switchToInputPhase() {
  S.s2_hintPhase = false;
  const v = VERSES[S.verseIdx];

  // 각 .word-bubble 안의 텍스트 → input으로 교체 (ci/wi 기반)
  document.querySelectorAll('.word-bubble').forEach(bubble => {
    const ci = parseInt(bubble.dataset.ci, 10);
    const wi = parseInt(bubble.dataset.wi, 10);
    const word = v.chunks[ci].text.split(' ')[wi];
    bubble.classList.remove('blinking');
    bubble.innerHTML = `<input class="bubble-input" type="text" data-ci="${ci}" data-wi="${wi}" ` +
      `style="width:${charWidth(word)}" ` +
      `autocomplete="off" autocorrect="off" spellcheck="false">`;
  });

  const guideEl = document.getElementById('s2-guide');
  if (guideEl) {
    guideEl.textContent = '빈칸을 채워주세요 ✏️';
    guideEl.classList.add('input-mode');
  }

  const btn = document.getElementById('btn-main');
  btn.style.display = '';
  btn.textContent = '확인';
  btn.className = 'btn-main';

  setupS2InputHandlers();
}

function setupS2InputHandlers() {
  const inputs = Array.from(document.querySelectorAll('.bubble-input'));
  const v = VERSES[S.verseIdx];
  const expectedOf = (input) => {
    const ci = parseInt(input.dataset.ci, 10);
    const wi = parseInt(input.dataset.wi, 10);
    return v.chunks[ci].text.split(' ')[wi];
  };

  inputs.forEach((input, i) => {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const next = inputs.slice(i + 1).find(n => !n.disabled);
        if (next) next.focus();
        else onMain();
      }
    });

    // 한 글자씩 입력될 때마다 즉시 정답 검사 (한칸씩 즉시 피드백)
    input.addEventListener('input', () => {
      if (input.disabled) return;
      const bubble = input.closest('.word-bubble');
      const val = normalize(input.value);
      const expected = expectedOf(input);
      // 다시 타이핑 시작 → wrong 표시 제거
      if (input.classList.contains('wrong')) {
        input.classList.remove('wrong');
        bubble?.classList.remove('wrong');
      }
      // 정확히 일치 → 즉시 정답 처리 + 다음 빈칸으로 자동 이동
      if (val === expected) {
        input.classList.add('correct');
        input.disabled = true;
        bubble?.classList.add('correct');
        if (inputs.every(n => n.disabled)) {
          completeS2Round();
        } else {
          const next = inputs.slice(i + 1).find(n => !n.disabled);
          next?.focus();
        }
      }
    });

    // 빈칸을 떠나는데 비어있지 않고 틀린 값이면 wrong 표시
    input.addEventListener('blur', () => {
      if (input.disabled) return;
      const val = normalize(input.value);
      if (val && val !== expectedOf(input)) {
        input.classList.add('wrong');
        input.closest('.word-bubble')?.classList.add('wrong');
      }
    });

    // 포커스 변경 시 힌트 씬도 해당 청크로 갱신
    input.addEventListener('focus', () => {
      const ci = parseInt(input.dataset.ci, 10);
      if (Number.isFinite(ci) && S.s2_hintChunkIdx !== ci) {
        S.s2_hintChunkIdx = ci;
        if (S.s2_hintVisible) {
          renderScene(v.chunks[ci]);
        }
      }
    });
  });
  if (inputs[0]) inputs[0].focus();
}

function completeS2Round() {
  S.stageCorrect++;
  S.streak++;
  updateStats();
  S.s2_totalRounds++;
  if (S.s2_totalRounds < S.s2_targetRounds) {
    showReviewBanner();
    setTimeout(() => {
      nextS2();
      hideFeedback();
      renderStage();
    }, 1000);
  } else {
    setTimeout(() => unlockStage(2), 800);
  }
}

function showReviewBanner() {
  const banner = document.createElement('div');
  banner.className = 'review-banner';
  banner.textContent = '복습!! 🎉';
  document.body.appendChild(banner);
  setTimeout(() => banner.remove(), 1000);
}

function checkStage2() {
  // 힌트 phase 에서 누르면 빈칸 phase 로 전환 (사용자 페이스)
  if (S.s2_hintPhase) { switchToInputPhase(); return; }
  const v = VERSES[S.verseIdx];
  const inputs = Array.from(document.querySelectorAll('.bubble-input'));
  if (inputs.length === 0) return;

  let allCorrect = true;
  let newlyCorrect = 0;
  inputs.forEach(input => {
    const bubble = input.closest('.word-bubble');
    if (input.disabled) return; // 이전에 정답 처리됨
    const ci = parseInt(input.dataset.ci, 10);
    const wi = parseInt(input.dataset.wi, 10);
    const answer = v.chunks[ci].text.split(' ')[wi];
    const val = normalize(input.value);
    if (val === answer) {
      input.classList.remove('wrong');
      input.classList.add('correct');
      input.disabled = true;
      bubble?.classList.remove('wrong');
      bubble?.classList.add('correct');
      newlyCorrect++;
    } else {
      allCorrect = false;
      input.classList.add('wrong');
      bubble?.classList.add('wrong');
      // 사용자가 다시 입력하면 'input' 이벤트로 wrong 클래스 제거됨 (값은 유지)
    }
  });

  S.s2_roundCorrect += newlyCorrect;

  if (allCorrect) {
    completeS2Round();
  } else {
    S.streak = 0;
    updateStats();
    setTimeout(() => {
      const firstEmpty = inputs.find(i => !i.disabled);
      firstEmpty?.focus();
    }, 400);
  }
}

/* ═══════════════════════════════════════
   3단계 — 랜덤 청크 단어 단위 빈칸 + 그림 힌트 토글
═══════════════════════════════════════ */
function renderStage3(area) {
  const v = VERSES[S.verseIdx];
  const chunk = v.chunks[S.s3_curChunkIdx];

  const groups = getVerseGroups(v);
  let curGroup = null;
  let curIdxInGroup = -1;
  for (const g of groups) {
    const idx = g.chunks.indexOf(chunk);
    if (idx >= 0) { curGroup = g; curIdxInGroup = idx; break; }
  }

  const chapterPart = v.title.split(' ').slice(0, 2).join(' ');
  const fullRef = curGroup ? `${chapterPart} ${curGroup.verseNum}` : v.title;

  const emojisHtml = v.chars.map((c,i) => {
    const isActive = chunk.chars.includes(i);
    return `<div class="emoji-item${isActive?' blinking':' dim'}">
      <div class="emoji-icon">${c.icon}</div>
      <div class="emoji-label">${c.name}</div>
    </div>`;
  }).join('');

  // 같은 절의 다른 청크들은 맥락으로, 현재 청크는 단어 단위 말풍선
  // 힌트 phase: 단어가 깜빡이며 보임 / 입력 phase: 빈칸 input
  const contextHtml = curGroup ? curGroup.chunks.map((ch, idx) => {
    if (idx === curIdxInGroup) {
      const wordsHtml = ch.text.split(' ').map((w, wi) => {
        if (S.s3_hintPhase) {
          return `<span class="word-bubble blinking" data-wi="${wi}">` +
            `<span class="bubble-text">${w}</span></span>`;
        }
        return `<span class="word-bubble" data-wi="${wi}">` +
          `<input class="bubble-input" type="text" data-wi="${wi}" ` +
          `style="width:${charWidth(w)}" ` +
          `autocomplete="off" autocorrect="off" spellcheck="false">` +
        `</span>`;
      }).join(' ');
      return `<div style="margin:8px 0;padding:10px 12px;background:var(--deep3);border-radius:10px;line-height:2.4;font-size:14px">${wordsHtml}</div>`;
    }
    return `<div style="font-size:13px;color:var(--text-muted);padding:5px 4px;line-height:1.7;border-left:2px solid var(--deep3);padding-left:10px;margin:4px 0">${ch.text}</div>`;
  }).join('') : '';

  const guideHtml = S.s3_hintPhase
    ? `<div class="s2-guide" id="s3-guide">👀 깜빡이는 단어를 외운 뒤 [도전!] 을 누르세요</div>`
    : `<div class="s2-guide input-mode" id="s3-guide">빈칸을 채워주세요 ✏️</div>`;

  const progressHtml = `<div class="progress-info">${S.s3_correct}/${S.s3_target} 정답 완료</div>`;

  const sceneHtml = S.s3_hintVisible
    ? `<div class="scene-stage" id="scene-stage"></div>`
    : '';
  const toggleHtml = `<button class="hint-toggle${S.s3_hintVisible?' on':''}" type="button" onclick="toggleS3Hint()">${S.s3_hintVisible?'🙈 그림 가리기':'💡 그림 힌트 보기'}</button>`;

  area.innerHTML = `
    ${sceneHtml}
    ${toggleHtml}
    <div class="card" style="margin-top:8px">
      <div class="emoji-row">${emojisHtml}</div>
      <div style="padding:4px 0">
        <div style="margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="vnum" style="font-size:12px;background:var(--purple);color:#fff;padding:3px 8px">${fullRef}</span>
          <span style="font-size:11px;color:var(--text-muted)">${curIdxInGroup+1}/${curGroup?.chunks.length||1} 청크</span>
        </div>
        ${contextHtml}
      </div>
    </div>
    ${guideHtml}
    ${progressHtml}
    <div class="spacer"></div>`;

  if (S.s3_hintVisible) {
    renderScene(chunk);
  }

  const btn = document.getElementById('btn-main');
  if (S.s3_hintPhase) {
    btn.textContent = '도전! ✨';
    btn.className = 'btn-main gold';
  } else {
    btn.textContent = '확인';
    btn.className = 'btn-main';
    setupS3InputHandlers();
  }
}

function switchToS3InputPhase() {
  S.s3_hintPhase = false;
  const v = VERSES[S.verseIdx];
  const chunk = v.chunks[S.s3_curChunkIdx];
  const words = chunk.text.split(' ');

  document.querySelectorAll('.word-bubble').forEach(bubble => {
    const wi = parseInt(bubble.dataset.wi, 10);
    if (!Number.isFinite(wi)) return;
    const word = words[wi];
    bubble.classList.remove('blinking');
    bubble.innerHTML = `<input class="bubble-input" type="text" data-wi="${wi}" ` +
      `style="width:${charWidth(word)}" ` +
      `autocomplete="off" autocorrect="off" spellcheck="false">`;
  });

  const guideEl = document.getElementById('s3-guide');
  if (guideEl) {
    guideEl.textContent = '빈칸을 채워주세요 ✏️';
    guideEl.classList.add('input-mode');
  }

  const btn = document.getElementById('btn-main');
  btn.textContent = '확인';
  btn.className = 'btn-main';

  setupS3InputHandlers();
}

function completeS3Chunk() {
  S.s3_correct++; S.stageCorrect++; S.streak++;
  showFeedback('correct', '✓ 정답!');
  updateStats();
  if (S.s3_correct >= S.s3_target) {
    setTimeout(()=>unlockStage(3), 1000);
  } else {
    setTimeout(()=>{ nextS3(); hideFeedback(); renderStage(); }, 1000);
  }
}

function setupS3InputHandlers() {
  const inputs = Array.from(document.querySelectorAll('.bubble-input'));
  const v = VERSES[S.verseIdx];
  const words = v.chunks[S.s3_curChunkIdx].text.split(' ');
  const expectedOf = (input) => words[parseInt(input.dataset.wi, 10)];

  inputs.forEach((input, i) => {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const next = inputs.slice(i + 1).find(n => !n.disabled);
        if (next) next.focus();
        else onMain();
      }
    });

    input.addEventListener('input', () => {
      if (input.disabled) return;
      const bubble = input.closest('.word-bubble');
      const val = normalize(input.value);
      const expected = expectedOf(input);
      if (input.classList.contains('wrong')) {
        input.classList.remove('wrong');
        bubble?.classList.remove('wrong');
      }
      if (val === expected) {
        input.classList.add('correct');
        input.disabled = true;
        bubble?.classList.add('correct');
        if (inputs.every(n => n.disabled)) {
          completeS3Chunk();
        } else {
          const next = inputs.slice(i + 1).find(n => !n.disabled);
          next?.focus();
        }
      }
    });

    input.addEventListener('blur', () => {
      if (input.disabled) return;
      const val = normalize(input.value);
      if (val && val !== expectedOf(input)) {
        input.classList.add('wrong');
        input.closest('.word-bubble')?.classList.add('wrong');
      }
    });
  });
  if (inputs[0]) inputs[0].focus();
}

window.toggleS3Hint = function() {
  S.s3_hintVisible = !S.s3_hintVisible;
  const toggleBtn = document.querySelector('.hint-toggle');
  if (S.s3_hintVisible) {
    let stage = document.getElementById('scene-stage');
    if (!stage) {
      stage = document.createElement('div');
      stage.className = 'scene-stage';
      stage.id = 'scene-stage';
      const area = document.getElementById('scroll-area');
      area.insertBefore(stage, area.firstChild);
    }
    const v = VERSES[S.verseIdx];
    renderScene(v.chunks[S.s3_curChunkIdx]);
    if (toggleBtn) {
      toggleBtn.textContent = '🙈 그림 가리기';
      toggleBtn.classList.add('on');
    }
  } else {
    const stage = document.getElementById('scene-stage');
    if (stage) stage.remove();
    if (toggleBtn) {
      toggleBtn.textContent = '💡 그림 힌트 보기';
      toggleBtn.classList.remove('on');
    }
  }
};

function checkStage3() {
  // 힌트 phase 에서 누르면 빈칸 phase 로 전환
  if (S.s3_hintPhase) { switchToS3InputPhase(); return; }

  const v = VERSES[S.verseIdx];
  const chunk = v.chunks[S.s3_curChunkIdx];
  const words = chunk.text.split(' ');
  const inputs = Array.from(document.querySelectorAll('.bubble-input'));
  if (inputs.length === 0) return;

  let allCorrect = true;
  inputs.forEach(input => {
    const bubble = input.closest('.word-bubble');
    if (input.disabled) return;
    const wi = parseInt(input.dataset.wi, 10);
    const answer = words[wi];
    const val = normalize(input.value);
    if (val === answer) {
      input.classList.remove('wrong');
      input.classList.add('correct');
      input.disabled = true;
      bubble?.classList.remove('wrong');
      bubble?.classList.add('correct');
    } else {
      allCorrect = false;
      input.classList.add('wrong');
      bubble?.classList.add('wrong');
    }
  });

  if (allCorrect) {
    completeS3Chunk();
  } else {
    S.streak = 0;
    updateStats();
    showFeedback('wrong', '✗ 빨간 빈칸을 다시 확인하세요');
    setTimeout(() => {
      const firstWrong = inputs.find(i => i.classList.contains('wrong'));
      firstWrong?.focus();
      hideFeedback();
    }, 1200);
  }
}

/* ═══════════════════════════════════════
   4단계 — 절 단위, 이모지 표시
═══════════════════════════════════════ */
function renderStage4(area) {
  const v = VERSES[S.verseIdx];
  const groups = S.s4_verseGroups;
  const g = groups[S.s4_groupIdx];

  // 이 절에 쓰이는 이모지 모음 (중복 제거, 순서 유지)
  const charIdxs = [];
  g.chunks.forEach(ch => ch.chars.forEach(ci => { if(!charIdxs.includes(ci)) charIdxs.push(ci); }));

  const emojisHtml = charIdxs.map(ci => {
    const c = v.chars[ci];
    const isDone = S.s4_done.has(S.s4_groupIdx);
    return `<div class="emoji-item${isDone?' correct':' blinking'}">
      <div class="emoji-icon">${c.icon}</div>
      <div class="emoji-label">${c.name}</div>
    </div>`;
  }).join('');

  // 이미 완료된 절은 텍스트 보여주고, 현재 절만 입력창
  const groupsHtml = groups.map((grp, gi) => {
    const isDone = S.s4_done.has(gi);
    const isCurrent = gi === S.s4_groupIdx;
    const grpCharIdxs = [];
    grp.chunks.forEach(ch => ch.chars.forEach(ci => { if(!grpCharIdxs.includes(ci)) grpCharIdxs.push(ci); }));
    const miniEmojis = grpCharIdxs.map(ci => {
      const c = v.chars[ci];
      return `<span class="mini-emoji${isDone?' correct':isCurrent?' blinking':''}">${c.icon}</span>`;
    }).join('');

    if (isDone) {
      const fullText = grp.chunks.map(ch=>ch.text).join(' ');
      return `<div class="verse-block">
        <div class="verse-block-label">
          <span class="vnum" style="font-size:12px">${grp.verseNum}</span>
          <div class="verse-block-emojis">${miniEmojis}</div>
        </div>
        <div style="font-size:13px;color:var(--teal-light);line-height:1.8;background:rgba(45,140,120,.06);border-radius:8px;padding:8px 10px">${fullText}</div>
      </div>`;
    } else if (isCurrent) {
      return `<div class="verse-block">
        <div class="verse-block-label">
          <span class="vnum" style="font-size:12px">${grp.verseNum}</span>
          <div class="verse-block-emojis">${miniEmojis}</div>
        </div>
        <textarea class="verse-textarea" id="s4-input-${gi}"
          placeholder="이 절 전체를 입력하세요..."
          autocomplete="off" autocorrect="off" spellcheck="false"
          onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();onMain()}"
          oninput="autoResize(this)"></textarea>
      </div>`;
    } else {
      return `<div class="verse-block">
        <div class="verse-block-label">
          <span class="vnum" style="font-size:12px;opacity:.4">${grp.verseNum}</span>
          <div class="verse-block-emojis">${grpCharIdxs.map(ci=>`<span class="mini-emoji" style="opacity:.2">${v.chars[ci].icon}</span>`).join('')}</div>
        </div>
        <div style="font-size:13px;color:var(--text-muted);background:var(--deep3);border-radius:8px;padding:8px 10px">아직 잠김</div>
      </div>`;
    }
  }).join('');

  area.innerHTML = `
    <div class="card" style="margin-top:12px">
      <div class="card-label">${g.verseNum} 이모지</div>
      <div class="emoji-row" style="padding:8px 0">${emojisHtml}</div>
    </div>
    <div class="card">${groupsHtml}</div>
    <div class="spacer"></div>`;

  document.getElementById('btn-main').textContent = '확인';
  document.getElementById('btn-main').className = 'btn-main';
  setTimeout(()=>document.getElementById(`s4-input-${S.s4_groupIdx}`)?.focus(), 100);
}

window.autoResize = function(el) {
  el.style.height='auto';
  el.style.height=Math.min(el.scrollHeight,160)+'px';
};

function checkStage4() {
  const v = VERSES[S.verseIdx];
  const groups = S.s4_verseGroups;
  const g = groups[S.s4_groupIdx];
  const answer = normalize(g.chunks.map(ch=>ch.text).join(' '));
  const input = document.getElementById(`s4-input-${S.s4_groupIdx}`);
  if (!input) return;
  const val = normalize(input.value);

  if (val === answer) {
    input.className = 'verse-textarea correct';
    input.disabled = true;
    S.s4_done.add(S.s4_groupIdx);
    S.stageCorrect++; S.streak++;
    showFeedback('correct','✓ 정답!');
    updateStats();
    if (S.s4_done.size === groups.length) {
      setTimeout(()=>unlockStage(4), 1000);
    } else {
      S.s4_groupIdx++;
      setTimeout(()=>{ hideFeedback(); renderStage(); }, 1000);
    }
  } else {
    input.className = 'verse-textarea wrong';
    S.streak = 0;
    showFeedback('wrong','✗ 정확히 입력하세요');
    setTimeout(()=>{ input.className='verse-textarea'; input.focus(); hideFeedback(); }, 1400);
  }
}

/* ═══════════════════════════════════════
   5단계 — 전체 한번에
═══════════════════════════════════════ */
function renderStage5(area) {
  const v = VERSES[S.verseIdx];
  const groups = getVerseGroups(v);

  // 전체 이모지 나열
  const allCharIdxs = [];
  v.chunks.forEach(ch => ch.chars.forEach(ci => { if(!allCharIdxs.includes(ci)) allCharIdxs.push(ci); }));
  const allDone = S.s5_done.size === groups.length;
  const emojisHtml = allCharIdxs.map(ci => {
    const c = v.chars[ci];
    // 이 캐릭터가 속한 절이 하나라도 완료됐으면 correct
    const anyDone = groups.some((g,gi) =>
      S.s5_done.has(gi) && g.chunks.some(ch=>ch.chars.includes(ci))
    );
    return `<div class="emoji-item${anyDone?' correct':''}">
      <div class="emoji-icon">${c.icon}</div>
      <div class="emoji-label">${c.name}</div>
    </div>`;
  }).join('');

  // 절별 입력칸
  const blocksHtml = groups.map((g, gi) => {
    const isDone = S.s5_done.has(gi);
    const fullText = g.chunks.map(ch=>ch.text).join(' ');
    return `<div class="full-verse-block">
      <div class="full-vnum">${g.verseNum}</div>
      ${isDone
        ? `<div class="full-input" style="border-color:var(--teal);background:rgba(45,140,120,.05);color:var(--teal-light);display:block;padding:10px 12px;border-radius:10px;font-size:14px;line-height:1.8">${fullText}</div>`
        : `<textarea class="full-input" id="s5-input-${gi}"
            placeholder="이 절을 정확히 입력하세요..."
            autocomplete="off" autocorrect="off" spellcheck="false"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();checkS5Single(${gi})}"
            oninput="autoResize(this)"></textarea>`
      }
    </div>`;
  }).join('');

  area.innerHTML = `
    <div class="card" style="margin-top:12px">
      <div class="card-label">전체 이모지</div>
      <div class="emoji-row" style="padding:6px 0">${emojisHtml}</div>
    </div>
    <div class="card">${blocksHtml}</div>
    <div class="spacer"></div>`;

  document.getElementById('btn-main').textContent = '전체 확인';
  document.getElementById('btn-main').className = 'btn-main gold';
  setTimeout(()=>document.getElementById('s5-input-0')?.focus(), 100);
}

window.checkS5Single = function(gi) {
  const v = VERSES[S.verseIdx];
  const groups = getVerseGroups(v);
  const g = groups[gi];
  const answer = normalize(g.chunks.map(ch=>ch.text).join(' '));
  const input = document.getElementById(`s5-input-${gi}`);
  if (!input || S.s5_done.has(gi)) return;
  const val = normalize(input.value);
  if (val === answer) {
    S.s5_done.add(gi);
    showFeedback('correct',`✓ ${g.verseNum} 정답!`);
    // 이모지 업데이트
    renderStage5(document.getElementById('scroll-area'));
    // 다음 입력칸 포커스
    const nextInput = document.getElementById(`s5-input-${gi+1}`);
    if (nextInput) setTimeout(()=>nextInput.focus(), 200);
  } else {
    input.className = 'full-input wrong';
    showFeedback('wrong','✗ 정확히 입력하세요');
    setTimeout(()=>{ if(input) { input.className='full-input'; input.focus(); } hideFeedback(); }, 1400);
  }
};

function checkStage5() {
  const v = VERSES[S.verseIdx];
  const groups = getVerseGroups(v);
  // 아직 안 된 것들 체크
  let allOk = true;
  groups.forEach((g, gi) => {
    if (S.s5_done.has(gi)) return;
    const input = document.getElementById(`s5-input-${gi}`);
    if (!input) return;
    const answer = normalize(g.chunks.map(ch=>ch.text).join(' '));
    const val = normalize(input.value);
    if (val === answer) {
      S.s5_done.add(gi);
    } else {
      allOk = false;
      input.className='full-input wrong';
      setTimeout(()=>{ if(input) input.className='full-input'; }, 1400);
    }
  });

  if (S.s5_done.size === groups.length) {
    // 완전 완료!
    S.stageCorrect++; S.streak++;
    S.mastered.add(v.id);
    updateStats();
    saveScore(v.id, {mastered:true, masteredAt:new Date().toISOString(), stage5done:true});
    renderVerseTabs();
    showComplete();
  } else {
    S.streak=0;
    showFeedback('wrong','✗ 모든 절을 정확히 입력하세요');
    // 부분 완료된 절 업데이트
    renderStage5(document.getElementById('scroll-area'));
  }
}

/* ═══════════════════════════════════════
   단계 잠금 해제
═══════════════════════════════════════ */
function unlockStage(next) {
  S.stageUnlocked[next]=true;
  const v = VERSES[S.verseIdx];
  saveScore(v.id, {['stage'+next+'done']:true, stage:next});
  showFeedback('correct', `✓ ${next}단계 잠금 해제! 다음 단계로 진행합니다.`);
  setTimeout(()=>{ window.selectStage(next); }, 1200);
}

/* ═══════════════════════════════════════
   완료 화면
═══════════════════════════════════════ */
function showComplete() {
  const v = VERSES[S.verseIdx];
  document.getElementById('scroll-area').innerHTML = `
    <div class="complete-screen">
      <div class="complete-icon">🎊</div>
      <div class="complete-title">${v.title}<br>완전 암기!</div>
      <div style="font-size:13px;color:var(--text-dim);margin-top:8px;margin-bottom:24px">
        5단계를 모두 완료했습니다
      </div>
      ${S.mastered.size===VERSES.length
        ? `<div style="font-size:16px;color:var(--gold-light);margin-bottom:16px">🏆 전체 ${VERSES.length}구절 완전 암기 달성!</div>`
        : ''
      }
      <a href="dashboard.html" style="display:block;padding:13px 28px;background:linear-gradient(135deg,var(--gold),#a07830);border-radius:12px;color:#1a1200;font-weight:700;text-decoration:none;font-size:15px;text-align:center;margin-bottom:10px">대시보드 보기 →</a>
      <button onclick="selectVerse(${(S.verseIdx+1)%VERSES.length})" style="width:100%;padding:11px;background:none;border:1px solid var(--card-border);border-radius:12px;color:var(--text-dim);font-size:14px;cursor:pointer">다음 구절 →</button>
    </div>`;
  document.getElementById('tts-bar').style.display='none';
  document.getElementById('bottom-nav').style.display='none';
}

/* ═══════════════════════════════════════
   TTS
═══════════════════════════════════════ */
function prepareTTS(text) {
  stopTTS();
  if (!('speechSynthesis' in window)) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang='ko-KR';
  utter.rate=parseFloat(document.getElementById('tts-speed')?.value||1);
  utter.onstart=()=>{ S.ttsPlaying=true; document.getElementById('tts-btn').textContent='⏸'; };
  utter.onend=()=>{ S.ttsPlaying=false; document.getElementById('tts-btn').textContent='▶'; document.getElementById('tts-fill').style.width='100%'; };
  utter.onboundary=(e)=>{ if(utter.text) document.getElementById('tts-fill').style.width=Math.round(e.charIndex/utter.text.length*100)+'%'; };
  S.ttsUtter=utter;
  setTimeout(()=>{ if(S.stageIdx===0) speechSynthesis.speak(utter); },300);
}
window.toggleTTS=function(){
  if(!S.ttsUtter) return;
  if(S.ttsPlaying){speechSynthesis.pause();S.ttsPlaying=false;document.getElementById('tts-btn').textContent='▶';}
  else if(speechSynthesis.paused){speechSynthesis.resume();S.ttsPlaying=true;document.getElementById('tts-btn').textContent='⏸';}
  else{speechSynthesis.speak(S.ttsUtter);}
};
window.changeTTSSpeed=function(){
  if(S.ttsUtter){S.ttsUtter.rate=parseFloat(document.getElementById('tts-speed').value);}
};
function stopTTS(){
  if('speechSynthesis' in window) speechSynthesis.cancel();
  S.ttsPlaying=false; S.ttsUtter=null;
}

/* ═══════════════════════════════════════
   버튼 핸들러
═══════════════════════════════════════ */
window.onMain = function() {
  if (S.stageIdx===0) {
    const v=VERSES[S.verseIdx];
    if (S.chunkIdx < v.chunks.length-1) {
      S.chunkIdx++;
      stopTTS();
      renderStage();
    } else {
      S.stageUnlocked[2]=true;
      saveScore(VERSES[S.verseIdx].id,{stage1done:true});
      showFeedback('correct','✓ 연상 완료! 단어 채우기로 이동합니다.');
      setTimeout(()=>{ window.selectStage(1); },1000);
    }
  } else if (S.stageIdx===1) checkStage2();
  else if (S.stageIdx===2) checkStage3();
  else if (S.stageIdx===3) checkStage4();
  else checkStage5();
};

window.onPrev = function() {
  if (S.stageIdx===0 && S.chunkIdx>0) {
    S.chunkIdx--;
    stopTTS();
    renderStage();
  }
};

window.onReplay = function() {
  if (S.stageIdx!==0) return;
  const v = VERSES[S.verseIdx];
  prepareTTS(v.chunks[S.chunkIdx].text);
};

/* 초기화 */
S.chunkIdx=0;
initStage();
renderAll();
</script>
