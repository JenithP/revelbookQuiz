<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<title>말씀 암기 훈련</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold-light:#8a6a22;
  --deep:#f6f2e6;--deep2:#fffdf6;--deep3:#ece5d1;
  --purple:#5d4cb8;--purple-light:#7b6abf;--purple-bright:#4a3b8c;
  --teal:#2a8c7a;--teal-light:#1f6d5e;
  --amber:#c97d2a;--amber-light:#a86417;
  --text:#1f1a35;--text-dim:#5a5275;--text-muted:#8e87a8;
  --card-bg:#ffffff;--card-border:rgba(30,20,60,.10);
  --success:#2a8c7a;--error:#c64242;
  --fs:1; /* 글자 크기 배율 (설정 탭, 1~4단계) */
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Pretendard',sans-serif;
  background:var(--deep);color:var(--text);
  display:flex;flex-direction:column;
  max-width:420px;margin:0 auto;
  height:100vh;height:100dvh;position:relative;
}

/* 헤더 */
.header{
  background:var(--deep2);border-bottom:1px solid var(--card-border);
  padding:10px 16px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.header-back{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--card-border);border-radius:8px;
  color:var(--text-dim);font-size:16px;cursor:pointer;text-decoration:none;flex-shrink:0;
}
.header-info{flex:1;min-width:0}
.header-chapter{font-size:13px;font-weight:600;color:var(--text);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-stage{font-size:11px;color:var(--text-dim);margin-top:1px}
.stage-dots{display:flex;gap:3px;flex-shrink:0}
.dot{width:18px;height:5px;border-radius:3px;background:var(--deep3);transition:.3s}
.dot.done{background:var(--teal)}
.dot.active{background:var(--purple-bright)}

/* 통계 바 */
.stat-bar{
  display:flex;gap:6px;padding:8px 16px;
  background:var(--deep2);border-bottom:1px solid var(--card-border);flex-shrink:0;
}
.stat-item{
  flex:1;background:var(--card-bg);border-radius:8px;padding:5px;text-align:center;
}
.stat-num{font-size:15px;font-weight:600;color:var(--text)}
.stat-label{font-size:10px;color:var(--text-muted);margin-top:1px}

/* 구절 탭 */
.verse-tabs{
  display:flex;overflow-x:auto;
  background:var(--deep2);border-bottom:1px solid var(--card-border);flex-shrink:0;
  scrollbar-width:none;
}
.verse-tabs::-webkit-scrollbar{display:none}
.vtab{
  flex-shrink:0;padding:7px 12px;font-size:12px;font-weight:500;
  color:var(--text-muted);border:none;background:none;cursor:pointer;
  border-bottom:2px solid transparent;transition:.2s;white-space:nowrap;
}
.vtab.active{color:var(--purple-bright);border-bottom-color:var(--purple-bright)}
.vtab.mastered{color:var(--teal)}

/* 스테이지 탭 */
.stage-tabs{
  display:flex;overflow-x:auto;gap:0;
  padding:8px 12px;background:var(--deep2);
  border-bottom:1px solid var(--card-border);flex-shrink:0;
  scrollbar-width:none;
}
.stage-tabs::-webkit-scrollbar{display:none}
.stab{
  flex-shrink:0;padding:5px 10px;border-radius:20px;font-size:12px;
  border:1px solid var(--card-border);background:none;
  color:var(--text-muted);cursor:pointer;transition:.2s;white-space:nowrap;margin-right:4px;
}
.stab.active{background:var(--purple);border-color:var(--purple);color:#fff}
.stab.done{border-color:var(--teal);color:var(--teal)}
.stab.locked{opacity:.3;cursor:not-allowed}

/* 스크롤 영역 */
.scroll-area{flex:1;overflow-y:auto;scrollbar-width:thin;scrollbar-color:var(--deep3) transparent;}
.scroll-area::-webkit-scrollbar{width:3px}
.scroll-area::-webkit-scrollbar-thumb{background:var(--deep3);border-radius:2px}

/* 공통 카드 */
.card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:14px;padding:14px;margin:12px 14px 0;
}
.card-label{font-size:11px;color:var(--text-muted);margin-bottom:8px;letter-spacing:.3px}

/* 이모지 영역 */
.emoji-row{
  display:flex;flex-wrap:wrap;gap:8px;justify-content:center;
  padding:14px;
}
.emoji-item{text-align:center;transition:.3s}
.emoji-icon{
  width:52px;height:52px;border-radius:12px;font-size:26px;
  display:flex;align-items:center;justify-content:center;
  background:var(--deep3);border:1px solid var(--card-border);
  transition:.3s;
}
.emoji-item.active .emoji-icon{
  background:rgba(127,107,200,.25);border-color:var(--purple-bright);
}
.emoji-item.dim .emoji-icon{opacity:.2}
.emoji-item.correct .emoji-icon{
  background:rgba(45,140,120,.2);border-color:var(--teal);
}
.emoji-label{font-size:9px;color:var(--text-muted);margin-top:4px;transition:.3s}
.emoji-item.active .emoji-label{color:var(--purple-bright)}
.emoji-item.correct .emoji-label{color:var(--teal-light)}

@keyframes blink{0%,100%{opacity:1;border-color:var(--purple-bright)}50%{opacity:.4;border-color:transparent}}
.emoji-item.blinking .emoji-icon{animation:blink 1s ease-in-out infinite}

/* 구절 텍스트 표시 */
.verse-line{margin-bottom:10px;font-size:14px;line-height:2}
.vnum{
  display:inline-block;font-size:10px;color:var(--text-muted);
  background:var(--deep3);border-radius:4px;padding:1px 5px;margin-right:5px;
  vertical-align:middle;
}
.chunk-highlight{color:var(--gold-light);font-weight:600}
.chunk-dim{color:var(--text-muted)}

/* 빈칸 — 글자수만큼 너비 */
.blank-input{
  display:inline-block;vertical-align:middle;
  background:rgba(74,59,140,.15);
  border:none;border-bottom:1.5px solid var(--purple-bright);
  color:var(--text);font-size:14px;font-family:'Pretendard',sans-serif;
  outline:none;padding:0 2px;margin:0 2px;
  border-radius:0;transition:.3s;
  min-width:20px;
}
.blank-input:focus{background:rgba(74,59,140,.25);border-bottom-color:var(--gold)}
.blank-input.correct{border-bottom-color:var(--teal);color:var(--teal-light);background:rgba(45,140,120,.1)}
.blank-input.wrong{border-bottom-color:var(--error);color:var(--error);animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-4px)}75%{transform:translateX(4px)}}

/* 청크 빈칸 (3단계) */
.chunk-blank-input{
  width:100%;background:var(--deep3);
  border:1px solid var(--purple-bright);border-radius:8px;
  color:var(--text);font-size:14px;font-family:'Pretendard',sans-serif;
  outline:none;padding:8px 10px;margin-top:6px;line-height:1.7;
  min-height:36px;
}
.chunk-blank-input:focus{border-color:var(--gold);background:rgba(74,59,140,.1)}
.chunk-blank-input.correct{border-color:var(--teal);background:rgba(45,140,120,.08);color:var(--teal-light)}
.chunk-blank-input.wrong{border-color:var(--error);animation:shake .3s ease}

/* 절 타이핑 (4단계) */
.verse-block{margin-bottom:14px}
.verse-block-label{
  font-size:12px;font-weight:600;color:var(--text-dim);
  margin-bottom:6px;display:flex;align-items:center;gap:6px;
}
.verse-block-emojis{display:flex;gap:4px;flex-wrap:wrap}
.mini-emoji{
  width:26px;height:26px;font-size:14px;border-radius:6px;
  display:flex;align-items:center;justify-content:center;
  background:var(--deep3);border:1px solid var(--card-border);
  transition:.3s;
}
.mini-emoji.blinking{animation:blink 1s ease-in-out infinite}
.mini-emoji.correct{background:rgba(45,140,120,.15);border-color:var(--teal);animation:none}

.verse-textarea{
  width:100%;background:var(--deep3);
  border:1px solid var(--card-border);border-radius:10px;
  color:var(--text);font-size:14px;font-family:'Pretendard',sans-serif;
  outline:none;padding:10px 12px;line-height:1.8;resize:none;
  min-height:60px;max-height:120px;overflow-y:auto;
}
.verse-textarea:focus{border-color:var(--purple-bright)}
.verse-textarea.correct{border-color:var(--teal);background:rgba(45,140,120,.05);color:var(--teal-light)}
.verse-textarea.wrong{border-color:var(--error);animation:shake .3s ease}

/* 4·5단계 — 깜빡이는 평문(타원 없음) */
.verse-hint-line{
  font-size:15px;line-height:2;color:var(--text);
  padding:12px 14px;background:var(--deep3);border-radius:10px;
}
.blink-line-4{animation:bubbleBlink4 3s ease-out infinite}
.blink-line-5{animation:bubbleBlink5 4s ease-out infinite}
/* 완료된 절 표시 */
.verse-done-text{
  font-size:13px;line-height:1.8;color:var(--teal-light);
  background:rgba(45,140,120,.06);border-radius:8px;padding:8px 10px;
}
.verse-progress{font-size:12px;color:var(--text-dim);margin:0 14px 6px;text-align:right}
/* 4·5단계 — 밑줄친 빈칸(줄글로 쭉 입력) */
.verse-lined{
  display:block;width:100%;box-sizing:border-box;
  border:none;outline:none;resize:none;overflow:hidden;
  background-color:transparent;
  background-image:repeating-linear-gradient(transparent,transparent calc(2em - 1.5px),var(--purple-bright) calc(2em - 1.5px),var(--purple-bright) 2em);
  background-attachment:local;
  line-height:2em;font-size:15px;font-family:'Pretendard',sans-serif;
  color:var(--text);padding:0 2px;
}
.verse-lined::placeholder{color:var(--text-muted)}
.verse-lined:focus{background-image:repeating-linear-gradient(transparent,transparent calc(2em - 1.5px),var(--gold) calc(2em - 1.5px),var(--gold) 2em)}
.verse-lined.correct{color:var(--teal-light);background-image:repeating-linear-gradient(transparent,transparent calc(2em - 1.5px),var(--teal) calc(2em - 1.5px),var(--teal) 2em)}
.verse-lined.wrong{animation:shake .3s ease}
.verse-answer-show{
  font-size:13px;line-height:1.8;color:var(--text-dim);
  background:rgba(30,20,60,.06);border-radius:8px;padding:8px 10px;margin-top:6px;
  display:none;
}

/* 5단계 전체 타이핑 */
.full-verse-block{margin-bottom:10px}
.full-vnum{font-size:12px;font-weight:600;color:var(--gold-light);margin-bottom:4px}
.full-verse-text{
  font-size:13px;color:var(--text-dim);line-height:1.8;
  background:rgba(30,20,60,.06);border-radius:8px;padding:8px 10px;
  margin-bottom:6px;
}
.full-input{
  width:100%;background:var(--deep3);
  border:1px solid var(--card-border);border-radius:10px;
  color:var(--text);font-size:14px;font-family:'Pretendard',sans-serif;
  outline:none;padding:10px 12px;line-height:1.8;resize:none;
  min-height:50px;
}
.full-input:focus{border-color:var(--purple-bright)}
.full-input.correct{border-color:var(--teal);background:rgba(45,140,120,.05);color:var(--teal-light)}
.full-input.wrong{border-color:var(--error);animation:shake .3s ease}

/* 피드백 */
.feedback{
  border-radius:10px;padding:10px 12px;margin:10px 14px 0;
  font-size:13px;line-height:1.6;display:none;
}
.feedback.correct{background:rgba(45,140,120,.15);border:1px solid rgba(45,140,120,.3);color:var(--teal-light)}
.feedback.partial{background:rgba(200,125,42,.15);border:1px solid rgba(200,125,42,.3);color:var(--amber-light)}
.feedback.wrong{background:rgba(200,100,100,.12);border:1px solid rgba(200,100,100,.25);color:var(--error)}

/* 오답 → 정답 힌트 (2·3단계 버블 아래) */
.bubble-answer-hint{
  position:absolute;top:100%;left:50%;
  transform:translateX(-50%);
  margin-top:3px;
  font-size:11px;color:var(--success);
  font-weight:700;letter-spacing:.2px;
  white-space:nowrap;pointer-events:none;
  background:var(--card-bg);
  padding:2px 7px;border-radius:6px;
  border:1px solid rgba(45,140,120,.45);
  z-index:5;
  box-shadow:0 2px 6px rgba(0,0,0,.06);
}
.word-bubble{position:relative}

/* 정답 노출 박스 (4·5단계 textarea 아래) */
.diff-reveal{
  margin:10px 14px 0;padding:12px 14px;
  background:rgba(45,140,120,.08);
  border:1px solid rgba(45,140,120,.35);
  border-radius:10px;
  font-size:14px;line-height:1.9;
}
.diff-reveal-label{
  font-size:11px;color:var(--text-muted);
  margin-bottom:4px;font-weight:600;letter-spacing:.3px;
}
.diff-reveal-text{
  font-size:calc(14px*var(--fs,1));line-height:1.9;
  color:var(--text);word-break:keep-all;
}
.diff-ok{color:var(--success)}
.diff-bad{
  color:#fff;background:var(--error);
  padding:0 4px;border-radius:4px;font-weight:700;
}
.diff-missing{
  color:var(--text-muted);opacity:.45;
  text-decoration:underline;text-decoration-color:var(--text-muted);
}

/* 진행 표시 */
.progress-info{
  text-align:center;font-size:12px;color:var(--text-muted);
  padding:8px;
}
.progress-dots{display:flex;gap:4px;justify-content:center;margin-top:4px}
.pdot{width:7px;height:7px;border-radius:50%;background:var(--deep3);transition:.3s}
.pdot.done{background:var(--teal)}
.pdot.current{background:var(--purple-bright)}

/* TTS 바 */
.tts-bar{
  background:var(--deep2);border-top:1px solid var(--card-border);
  padding:8px 14px;display:flex;align-items:center;gap:10px;flex-shrink:0;
}
.tts-play{
  width:36px;height:36px;border-radius:50%;background:var(--purple);border:none;
  color:#fff;font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;
}
.tts-track{flex:1;height:3px;background:var(--deep3);border-radius:2px;cursor:pointer}
.tts-fill{height:100%;background:var(--purple-bright);border-radius:2px;width:0%;transition:.1s}
.tts-speed{
  background:var(--deep3);border:none;color:var(--text-dim);
  font-size:11px;border-radius:6px;padding:3px 6px;cursor:pointer;
}

/* 하단 버튼 */
.bottom-nav{
  background:var(--deep2);border-top:1px solid var(--card-border);
  padding:10px 14px calc(10px + env(safe-area-inset-bottom));
  display:flex;gap:8px;flex-shrink:0;
}
.btn-prev{
  flex:1;padding:11px;border-radius:10px;
  border:1px solid var(--card-border);background:none;
  color:var(--text-dim);font-size:13px;cursor:pointer;
  font-family:'Pretendard',sans-serif;
}
.btn-prev:disabled{opacity:.35;cursor:not-allowed}
.btn-replay{
  flex:1;padding:11px;border-radius:10px;
  background:rgba(201,168,76,0.15);
  border:1px solid rgba(201,168,76,0.55);
  color:var(--gold-light);font-size:13px;cursor:pointer;font-weight:600;
  font-family:'Pretendard',sans-serif;transition:.2s;
}
.btn-replay:hover{background:rgba(201,168,76,0.25)}
.btn-main{
  flex:2;padding:11px;border-radius:10px;
  background:var(--purple);border:none;
  color:#fff;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;
  font-family:'Pretendard',sans-serif;
}
.btn-main:hover{background:var(--purple-light)}
.btn-main.gold{background:linear-gradient(135deg,var(--gold),#a07830);color:#1a1200}
.btn-main:disabled{opacity:.4;cursor:not-allowed}

/* 완료 */
.complete-screen{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:40px 24px;text-align:center;
}
.complete-icon{font-size:52px;margin-bottom:16px}
.complete-title{font-family:'Nanum Myeongjo',serif;font-size:22px;color:var(--gold-light);margin-bottom:8px}

/* 1단계 씬 */
.scene-bg{
  background:linear-gradient(180deg,#0d1b3e 0%,#1a1040 100%);
  border-radius:14px;padding:20px 14px;margin:12px 14px 0;
  display:flex;flex-direction:column;align-items:center;
  position:relative;overflow:hidden;min-height:160px;justify-content:center;
}
.scene-glow{
  position:absolute;bottom:0;left:50%;transform:translateX(-50%);
  width:200px;height:80px;
  background:radial-gradient(ellipse,rgba(74,59,140,.4) 0%,transparent 70%);
}
.scene-img-wrap{
  position:relative;z-index:1;
  display:flex;align-items:center;justify-content:center;
  width:100%;min-height:140px;
}
.scene-img{
  width:140px;height:140px;object-fit:contain;
  transition:opacity 0.3s ease;
  filter:drop-shadow(0 4px 12px rgba(201,168,76,0.3));
  opacity:1;
}
.scene-img.fade{
  opacity:0;
  transition:opacity 0.2s ease;
}
.scene-fallback{
  font-size:60px;text-align:center;line-height:1;
  filter:drop-shadow(0 4px 12px rgba(201,168,76,0.3));
  transition:opacity 0.3s ease;opacity:1;
}
.scene-fallback.fade{opacity:0;transition:opacity 0.2s ease}
.scene-chunk{
  position:relative;z-index:1;
  background:rgba(0,0,0,.55);border:1px solid rgba(255,255,255,.18);
  border-radius:10px;padding:12px 16px;text-align:center;
  font-size:15px;line-height:1.8;color:#f0ece0;margin-top:14px;
  max-width:340px;width:100%;
}
.scene-note{font-size:11px;color:rgba(255,255,255,.7);margin-top:6px}

/* 1단계 — PNG 레이어 씬 */
.scene-stage{
  position:relative;
  width:calc(100% - 28px);
  height:220px;
  background:linear-gradient(180deg,#0d1b3e 0%,#1a1040 100%);
  border-radius:14px;
  overflow:hidden;
  margin:12px 14px 0;
}
.scene-actor{
  position:absolute;
  transform:translate(-50%,-50%);
  object-fit:contain;
  filter:drop-shadow(0 4px 16px rgba(201,168,76,0.2));
  transition:opacity 0.6s ease, filter 0.6s ease, left 0.6s ease, top 0.6s ease, width 0.6s ease, height 0.6s ease;
  pointer-events:none;
}
@keyframes fadeUp{
  from{opacity:0;transform:translate(-50%,-40%)}
  to{opacity:1;transform:translate(-50%,-50%)}
}
@keyframes slideLeft{
  from{opacity:0;transform:translate(-30%,-50%)}
  to{opacity:1;transform:translate(-50%,-50%)}
}
@keyframes slideRight{
  from{opacity:0;transform:translate(-70%,-50%)}
  to{opacity:1;transform:translate(-50%,-50%)}
}
@keyframes dropIn{
  from{opacity:0;transform:translate(-50%,-70%)}
  to{opacity:1;transform:translate(-50%,-50%)}
}
@keyframes flyIn{
  from{opacity:0;transform:translate(-30%,-70%) scale(0.7)}
  to{opacity:1;transform:translate(-50%,-50%) scale(1)}
}

/* 2단계 — 타원형 말풍선 */
.word-bubble{
  display:inline-block;
  border:2px solid var(--purple-bright);
  border-radius:50px;
  padding:2px 12px;
  background:rgba(157,143,224,0.15);
  vertical-align:middle;
  margin:0 2px;
  transition:border-color .2s, background .2s;
}
.word-bubble.wrong{
  border-color:var(--error);
  background:rgba(224,112,112,0.18);
}
.word-bubble.correct{
  border-color:var(--teal);
  background:rgba(45,140,120,0.15);
}
.bubble-text{display:inline-block}
.word-bubble.blinking .bubble-text{
  animation:bubbleBlink 2s ease-out infinite;
}
@keyframes bubbleBlink{
  0%{opacity:0}
  60%{opacity:1}
  95%{opacity:1}
  96%{opacity:0}
  100%{opacity:0}
}
/* 4단계 — 보이는 시간 짧고 안 보이는 시간 길게 (사이클 3s) */
@keyframes bubbleBlink4{
  0%{opacity:0}
  70%{opacity:1}
  80%{opacity:1}
  81%{opacity:0}
  100%{opacity:0}
}
/* 5단계 — 보이는 시간 매우 짧음 (사이클 4s) */
@keyframes bubbleBlink5{
  0%{opacity:0}
  78%{opacity:1}
  82%{opacity:1}
  83%{opacity:0}
  100%{opacity:0}
}
.word-bubble.blinking-4 .bubble-text{
  animation:bubbleBlink4 3s ease-out infinite;
}
.word-bubble.blinking-5 .bubble-text{
  animation:bubbleBlink5 4s ease-out infinite;
}

/* 4·5단계 빈칸 배경 박스 */
.bubble-verse-box{
  padding:10px 12px;background:var(--deep3);
  border-radius:10px;line-height:2.6;font-size:14px;
}

/* 2단계 — 그림 힌트 토글 */
.hint-toggle{
  display:block;
  margin:8px 14px 0;
  padding:9px 14px;
  border-radius:10px;
  border:1px solid var(--card-border);
  background:rgba(201,168,76,0.10);
  color:var(--gold-light);
  font-size:13px;font-weight:500;
  font-family:'Pretendard',sans-serif;
  cursor:pointer;
  width:calc(100% - 28px);
  transition:background .2s, border-color .2s;
}
.hint-toggle:hover{background:rgba(201,168,76,0.22)}
.hint-toggle.on{background:rgba(201,168,76,0.25);border-color:var(--gold)}

/* 2단계 — 절 그룹 (전체 장 표시) */
.s2-verse-group{
  margin-bottom:14px;
  padding-bottom:10px;
  border-bottom:1px solid var(--card-border);
}
.s2-verse-group:last-child{
  margin-bottom:0;
  padding-bottom:0;
  border-bottom:none;
}
.s2-vnum{
  font-size:12px;font-weight:600;color:var(--gold-light);
  margin-bottom:6px;
}
.s2-verse-text{
  font-size:14px;line-height:2.4;color:var(--text);
}
.bubble-input{
  border:none;background:transparent;outline:none;
  font-size:14px;font-family:'Pretendard',sans-serif;
  color:var(--text);text-align:center;padding:0;
}
.bubble-input.correct{color:var(--teal-light)}
.bubble-input.wrong{animation:shake 0.3s ease;color:var(--error)}
.bubble-input:disabled{color:var(--teal-light);opacity:1}

/* 복습 배너 */
.review-banner{
  position:fixed;top:50%;left:50%;
  font-size:32px;font-weight:700;color:#fff8e0;
  background:linear-gradient(135deg,#b8932f 0%,#8a6a22 100%);
  border:2px solid #8a6a22;border-radius:20px;
  padding:20px 40px;z-index:1000;pointer-events:none;
  box-shadow:0 8px 32px rgba(184,147,47,0.45);
  animation:bannerPop 1s ease forwards;
}
@keyframes bannerPop{
  0%{transform:translate(-50%,-50%) scale(0.5);opacity:0}
  20%{transform:translate(-50%,-50%) scale(1.1);opacity:1}
  80%{transform:translate(-50%,-50%) scale(1);opacity:1}
  100%{transform:translate(-50%,-50%) scale(0.9);opacity:0}
}

/* 라운드 점 */
.round-dots{display:flex;gap:6px;justify-content:center;margin-top:6px}
.round-dot{width:8px;height:8px;border-radius:50%;background:var(--deep3);transition:.3s}
.round-dot.done{background:var(--teal)}
.round-dot.current{background:var(--purple-bright)}

/* 2단계 안내 텍스트 */
.s2-guide{
  text-align:center;font-size:13px;padding:8px 14px;
  color:var(--purple-bright);
}
.s2-guide.input-mode{color:var(--gold-light)}

/* 스페이서 */
.spacer{height:14px}

/* ===== 글자 크기 배율 (설정 탭) — 본문 텍스트 스케일 ===== */
.scene-chunk,.verse-hint-line,.verse-lined{font-size:calc(15px*var(--fs,1))}
.s2-verse-text,.bubble-input,.verse-line,.bubble-verse-box,.chunk-blank-input,.blank-input{font-size:calc(14px*var(--fs,1))}
.verse-done-text,.full-verse-text{font-size:calc(13px*var(--fs,1))}

/* ===== 설정 (⚙) ===== */
.header-gear{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--card-border);border-radius:8px;background:none;
  color:var(--text-dim);font-size:16px;cursor:pointer;flex-shrink:0;padding:0;
}
.header-gear:hover{color:var(--gold-light);border-color:var(--gold)}
.settings-overlay{
  position:fixed;inset:0;z-index:2000;max-width:420px;margin:0 auto;
  background:rgba(0,0,0,.62);display:none;align-items:center;justify-content:center;
}
.settings-overlay.open{display:flex}
.settings-panel{
  background:var(--deep2);border:1px solid var(--card-border);border-radius:16px;
  padding:20px;width:calc(100% - 48px);max-width:340px;
  box-shadow:0 12px 40px rgba(0,0,0,.55);
}
.settings-head{
  display:flex;justify-content:space-between;align-items:center;
  font-size:16px;font-weight:700;color:var(--gold-light);margin-bottom:18px;
}
.settings-x{background:none;border:none;color:var(--text-dim);font-size:18px;cursor:pointer;padding:0}
.settings-label{font-size:13px;color:var(--text-dim);margin-bottom:8px}
.fs-row{display:flex;gap:8px;margin-bottom:18px}
.fs-btn{
  flex:1;padding:12px 0;border-radius:10px;border:1px solid var(--card-border);
  background:var(--card-bg);color:var(--text-dim);font-size:15px;font-weight:600;
  cursor:pointer;transition:.2s;
}
.fs-btn.active{background:var(--purple);border-color:var(--purple-bright);color:#fff}
.fs-preview-label{font-size:11px;color:var(--text-muted);margin-bottom:6px}
.fs-preview{padding:12px 14px;background:var(--deep3);border-radius:10px;line-height:2;color:var(--text);font-size:calc(15px*var(--fs,1))}

/* ===== 아바타 / 보상(옷입히기) ===== */
.header-avatar{
  width:34px;height:34px;border-radius:50%;overflow:hidden;flex-shrink:0;padding:0;
  border:1px solid var(--gold);background:var(--deep3);cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}
.header-avatar img{width:100%;height:100%;object-fit:cover}
.av-overlay{
  position:fixed;inset:0;z-index:2500;max-width:420px;margin:0 auto;
  background:rgba(0,0,0,.72);display:flex;align-items:center;justify-content:center;
}
.av-card{
  background:var(--deep2);border:1px solid var(--gold);border-radius:18px;
  padding:24px 22px;width:calc(100% - 48px);max-width:340px;text-align:center;
  box-shadow:0 14px 48px rgba(0,0,0,.6);animation:bannerPop .5s ease;
}
.av-head{display:flex;justify-content:space-between;align-items:center;font-size:16px;font-weight:700;color:var(--gold-light);margin-bottom:14px}
.av-announce{font-size:16px;font-weight:600;color:var(--gold-light);line-height:1.5;margin-bottom:16px}
.av-gift{width:130px;height:130px;object-fit:contain;margin:6px auto 18px;display:block;animation:giftIn .6s ease}
.av-gift-fallback{font-size:88px;margin:6px auto 18px}

.av-char{width:180px;height:180px;object-fit:contain;margin:4px auto 14px;display:block}
.av-char.big{width:210px;height:210px}
.av-item-name{font-size:15px;color:var(--teal-light);font-weight:600;margin-bottom:16px}
.av-btn{width:100%;padding:13px;border:none;border-radius:12px;background:var(--purple);color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;transition:.2s}
.av-btn:hover{filter:brightness(1.1)}
.av-btn.gold{background:linear-gradient(135deg,var(--gold),#a07830);color:#1a1200}
.av-pick-row{display:flex;gap:14px;margin-top:8px}
.av-pick{flex:1;background:var(--deep3);border:2px solid var(--card-border);border-radius:14px;padding:14px 8px;cursor:pointer;color:var(--text);font-size:14px;font-weight:600;font-family:inherit}
.av-pick img{width:92px;height:92px;object-fit:contain;display:block;margin:0 auto 8px}
.av-pick:hover{border-color:var(--gold)}
.av-list{margin-top:6px;text-align:left}
.av-li{display:flex;justify-content:space-between;align-items:center;gap:8px;padding:9px 10px;border-radius:8px;background:var(--deep3);margin-bottom:6px;font-size:13px;color:var(--text-muted)}
.av-li.got{color:var(--teal-light);background:rgba(45,140,120,.08)}
.av-li-need{font-size:11px;color:var(--text-muted);text-align:right;flex-shrink:0}
/* 면류관 피날레 */
.av-overlay.finale{flex-direction:column;background:var(--deep)}
.av-fanfare{font-size:42px;margin-bottom:10px;animation:giftIn .6s ease}
.av-finale-stage{position:relative;width:240px;height:300px;display:flex;align-items:flex-end;justify-content:center}
.av-finale-stage .av-char{width:220px;height:220px;margin:0}
.av-crown-drop{position:absolute;left:50%;top:0;width:118px;height:118px;object-fit:contain;animation:crownDrop 2.4s ease forwards}
@keyframes crownDrop{0%{transform:translate(-50%,-170px);opacity:0}25%{opacity:1}100%{transform:translate(-50%,14px)}}
.av-card.pop{margin-top:20px}
/* 첫 진입 단계: 콘텐츠 위 팝업이 아니라 단독 화면처럼 */
.av-overlay.landing{background:var(--deep)}
.ch-list{display:flex;flex-direction:column;gap:8px;margin-top:6px}
.ch-pick{padding:13px;border-radius:12px;border:1px solid var(--card-border);background:var(--deep3);color:var(--text);font-size:15px;font-weight:600;cursor:pointer;font-family:inherit;transition:.2s}
.ch-pick:hover{border-color:var(--gold);background:rgba(201,168,76,.1)}

/* 절 단위 그룹핑 */
function getVerseGroups(v) {
  const groups = [];
  let cur = null;
  v.chunks.forEach(ch => {
    if (ch.verseNum) { cur = {verseNum:ch.verseNum, chunks:[]}; groups.push(cur); }
    if (cur) cur.chunks.push(ch);
  });
  return groups;
}

function verseStageDone(id, stage){ return !!S.scores[id]?.['stage'+stage+'done']; }
function anyStageDone(stage){ return VERSES.some(v => !!S.scores[v.id]?.['stage'+stage+'done']); }
function allStageDone(stage){ return VERSES.every(v => !!S.scores[v.id]?.['stage'+stage+'done']); }
function imgUrl(name){ return encodeURI('/images/' + name); }
function baseAvatar(){ return S.avatarGender==='girl' ? 'girl.png' : 'boy.png'; }
function pickImg(it){ return S.avatarGender==='girl' ? it.girl : it.boy; }
// 현재 아바타 = 가장 마지막으로 획득한 아이템 그림 (없으면 기본)
function currentAvatarImg(excludeId){
  let img = baseAvatar();
  for (const it of AVATAR_ITEMS) {
    if (it.id === excludeId) continue;
    if (S.avatarUnlocked.has(it.id)) img = pickImg(it);
  }
  return img;
}
function avatarKey(){ return 'revel_avatarItems_' + (S.user?.uid || 'guest'); }
function loadAvatarState(){
  S.avatarGender = S.user?.avatar || localStorage.getItem('revel_avatarGender') || null;
  try { S.avatarUnlocked = new Set(JSON.parse(localStorage.getItem(avatarKey()) || '[]')); }
  catch(e){ S.avatarUnlocked = new Set(); }
}
function saveAvatarState(){ localStorage.setItem(avatarKey(), JSON.stringify([...S.avatarUnlocked])); }
// 마지막 위치(장+단계) 기억 — 재접속 시 단계까지 이어서 복원
function lastPosKey(){ return 'revel_lastPos_' + (S.user?.uid || 'guest'); }
function saveLastPos(){
  try { localStorage.setItem(lastPosKey(), JSON.stringify({ v:S.verseIdx, s:S.stageIdx })); } catch(e){}
}
function getLastPos(){
  try {
    const o = JSON.parse(localStorage.getItem(lastPosKey()) || 'null');
    if (!o || !(o.v >= 0 && o.v < VERSES.length)) return null;
    return { v: o.v, s: (o.s >= 0 && o.s <= 4) ? o.s : 0 };
  } catch(e){ return null; }
}
// 마지막 장+단계로 바로 시작
function restoreLastPos(pos){
  stopTTS();
  S.verseIdx = pos.v;
  S.stageIdx = pos.s || 0;
  S.stageCorrect = 0; S.streak = 0; S.chunkIdx = 0;
  S.stageUnlocked = defaultUnlocked();
  S.started = true;
  if (S.stageIdx >= 1) initStage();   // 2~5단계는 내부 상태 셋업 필요
  saveLastPos();
  renderAll();
}
function setGender(g){
  S.avatarGender = g;
  localStorage.setItem('revel_avatarGender', g);
  try { const u = JSON.parse(localStorage.getItem('revel_user')||'{}'); u.avatar = g; localStorage.setItem('revel_user', JSON.stringify(u)); } catch(e){}
}
function renderAvatarThumb(){
  const el = document.getElementById('avatar-thumb');
  if (!el) return;
  if (!S.avatarGender) { el.style.display='none'; return; }
  el.style.display='';
  el.innerHTML = `<img src="${imgUrl(currentAvatarImg())}" alt="" onerror="this.src='${imgUrl(baseAvatar())}'">`;
}
const fallbackGift = `onerror="this.replaceWith(Object.assign(document.createElement('div'),{className:'av-gift-fallback',textContent:'🎁'}))"`;
function avatarImgTag(name, cls, fallbackName){
  return `<img class="${cls}" src="${imgUrl(name)}" alt="" onerror="this.onerror=null;this.src='${imgUrl(fallbackName||baseAvatar())}'">`;
}

// 첫 진입: 이미 조건 충족한 보상은 조용히 획득 처리 (모달 없이 기준선)
let avatarBooted = false;
function bootAvatar(){
  if (avatarBooted) return; avatarBooted = true;
  loadAvatarState();
  renderAvatarThumb();
  if (!S.avatarGender) {
    // 첫 접속 → 캐릭터 설정 → 장 선택
    showGenderPicker();
    return;
  }
  // 캐릭터 기설정 → 보유 보상 동기화
  AVATAR_ITEMS.forEach(it => { if (it.cond()) S.avatarUnlocked.add(it.id); });
  saveAvatarState();
  renderAvatarThumb();
  const pos = getLastPos();
  if (pos != null) {
    // 재접속 → 장 선택 없이 마지막 장+단계로 바로 이어서 시작
    restoreLastPos(pos);
  } else {
    // 캐릭터는 있으나 아직 장을 한 번도 안 고름 → 장 선택
    showChapterSelect();
  }
}
// 새로 충족된 보상 감지 → 큐에 넣고 순서대로 표시
function checkMilestones(){
  if (!S.avatarGender || !avatarBooted) return;
  AVATAR_ITEMS.forEach(it => {
    if (!S.avatarUnlocked.has(it.id) && it.cond() && !S.giftQueue.includes(it.id)) S.giftQueue.push(it.id);
  });
  if (!S.giftModalOpen) showNextGift();
}
function showNextGift(){
  if (S.giftQueue.length === 0) return;
  const it = AVATAR_ITEMS.find(x => x.id === S.giftQueue[0]);
  if (!it) { S.giftQueue.shift(); return; }
  if (it.finale) showCrownFinale(it); else showGiftModal(it);
}

/* Firebase 점수 로드 */
async function loadScores() {
  if (S.user.isGuest) { renderAll(); return; }
  try {

    if (snap.exists()) {
      S.scores = snap.data();

async function saveScore(verseId, data) {
  // 메모리에는 항상 반영 (게스트 포함) — 보상 감지에 사용
  S.scores[verseId] = {...(S.scores[verseId]||{}), ...data};

  try {

      }, {merge:true});
    }
  } catch(e){}
}

/* ═══════════════════════════════════════
   유틸
═══════════════════════════════════════ */
function shuffle(arr) {
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}
// 글자수 기반 input 너비 계산 (한글 1글자 ≈ 1em)
function charWidth(word) {
  return Math.max(word.length, 2) + 'em';
}
function normalize(s) { return s.trim().replace(/\s+/g,' '); }
// 띄어쓰기 무시 비교용 — 모든 공백 제거 (글자만 맞으면 정답)
function normalizeNoSpace(s) { return s.replace(/\s+/g,''); }

function escapeHtml(s){
  return String(s).replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;','\'':'&#39;'}[c]));
}
// 정답(공백 포함)을 한 글자씩 표시하면서 사용자 입력과 비교
// 맞은 글자=초록, 틀린 글자=빨강 배경, 안 친 글자=흐리게
function diffAnswerVsAttempt(answer, attempt) {
  const aRaw = answer || '';
  const uNorm = (attempt || '').replace(/\s+/g,'');
  let ai = 0;
  const out = [];
  for (const ch of aRaw) {
    if (/\s/.test(ch)) { out.push(ch); continue; }
    const uc = uNorm[ai];
    if (uc == null) out.push(`<span class="diff-missing">${escapeHtml(ch)}</span>`);
    else if (uc === ch) out.push(`<span class="diff-ok">${escapeHtml(ch)}</span>`);
    else out.push(`<span class="diff-bad">${escapeHtml(ch)}</span>`);
    ai++;
  }
  return out.join('');
}
function showAnswerDiff(targetEl, answer, attempt) {
  removeAnswerDiff();
  const box = document.createElement('div');
  box.className = 'diff-reveal';
  box.id = 'diff-reveal';
  box.innerHTML =
    `<div class="diff-reveal-label">📖 정답 (빨간 글자가 틀렸어요)</div>
     <div class="diff-reveal-text">${diffAnswerVsAttempt(answer, attempt)}</div>`;
  if (targetEl && targetEl.parentNode) {
    targetEl.parentNode.insertBefore(box, targetEl.nextSibling);
  } else {
    document.getElementById('scroll-area').appendChild(box);
  }
}
function removeAnswerDiff() {
  document.getElementById('diff-reveal')?.remove();
}
function addBubbleAnswerHint(bubble, answer) {
  if (!bubble || bubble.querySelector('.bubble-answer-hint')) return;
  const hint = document.createElement('span');
  hint.className = 'bubble-answer-hint';
  hint.textContent = answer;
  bubble.appendChild(hint);
}
function removeBubbleAnswerHint(bubble) {
  bubble?.querySelector('.bubble-answer-hint')?.remove();
}

/* ═══════════════════════════════════════
   선택 핸들러
═══════════════════════════════════════ */
window.selectVerse = function(i) {
  stopTTS();
  S.verseIdx=i; S.stageIdx=0; S.stageCorrect=0; S.streak=0;
  S.stageUnlocked = defaultUnlocked();
  S.started = true;
  saveLastPos();
  hideFeedback();
  renderAll();
};

window.selectStage = function(i) {
  if(!S.stageUnlocked[i]) return;
  stopTTS();
  S.stageIdx=i; S.stageCorrect=0;
  saveLastPos();
  hideFeedback();
  initStage();
  renderStageTabs(); updateHeader(); updateStats(); renderStage();
};

function initStage() {
  const v = VERSES[S.verseIdx];
  if (S.stageIdx===1) {
    S.s2_totalRounds = 0;
    S.s2_targetRounds = 3;
    S.s2_blankIndices = [];
    S.s2_hintVisible = false;
    S.s2_hintChunkIdx = -1;
    nextS2();
  } else if (S.stageIdx===2) {
    S.s3_queue = shuffle(v.chunks.map((_,i)=>i));
    S.s3_correct=0; S.s3_target=4;
    S.s3_curChunkIdx=-1;
    S.s3_hintVisible = false;
    nextS3();
  } else if (S.stageIdx===3) {
    S.s4_verseGroups = getVerseGroups(v);
    S.s4_groupIdx=0; S.s4_done=new Set();
    S.s4_hintVisible = false;
    S.s4_hintPhase = true;
  } else if (S.stageIdx===4) {
    S.s5_done=new Set();
    S.s5_hintVisible = false;
    S.s5_hintGroupIdx = 0;
    S.s5_hintPhase = true;
  }
}

function nextS2() {
  const v = VERSES[S.verseIdx];
  const groups = getVerseGroups(v);
  const blanks = [];
  // 라운드가 진행될수록 각 절마다 +2 (라운드1:2, 라운드2:4, 라운드3:6)
  // 짧은 절은 보유 단어 수까지만 (자연스럽게 하나만 늘기도 함)
  const desired = 2 + S.s2_totalRounds * 2;
  groups.forEach(g => {
    const groupWords = [];
    g.chunks.forEach(ch => {
      const ci = v.chunks.indexOf(ch);
      ch.text.split(' ').forEach((_, wi) => {
        groupWords.push({ ci, wi });
      });
    });
    const count = Math.min(groupWords.length, desired);
    blanks.push(...shuffle(groupWords).slice(0, count));
  });
  S.s2_blankIndices = blanks;
  S.s2_roundCorrect = 0;
  S.s2_hintPhase = true;
  // 힌트 씬은 첫 번째 빈칸의 청크부터 시작
  S.s2_hintChunkIdx = blanks.length > 0 ? blanks[0].ci : -1;
}

function nextS3() {
  const v = VERSES[S.verseIdx];
  if (S.s3_queue.length===0) S.s3_queue = shuffle(v.chunks.map((_,i)=>i));
  S.s3_curChunkIdx = S.s3_queue.shift();
  S.s3_hintPhase = true; // 각 청크는 힌트 페이즈로 시작
}

/* ═══════════════════════════════════════
   메인 렌더 분기
═══════════════════════════════════════ */
function renderStage() {
  const area = document.getElementById('scroll-area');
  // 장 선택 전: 퀴즈/음성 시작 금지 (빈 화면, 랜딩 오버레이가 덮음)
  if (!S.started) {
    stopTTS();
    area.innerHTML = '';
    document.getElementById('tts-bar').style.display = 'none';
    document.getElementById('btn-prev').style.display = 'none';
    document.getElementById('btn-replay').style.display = 'none';
    document.getElementById('btn-main').style.display = 'none';
    return;
  }
  document.getElementById('bottom-nav').style.display = '';  // 완전암기 화면에서 숨겼던 하단바 복원
  document.getElementById('btn-main').style.display = '';
  const inStage1 = S.stageIdx===0;
  document.getElementById('tts-bar').style.display = inStage1 ? 'flex' : 'none';
  document.getElementById('btn-prev').style.display = inStage1 ? 'flex' : 'none';
  document.getElementById('btn-replay').style.display = inStage1 ? 'flex' : 'none';
  // 2단계 힌트 phase에서 숨겼던 btn-main 기본 복원 (각 stage 함수에서 다시 제어 가능)
  document.getElementById('btn-main').style.display = '';

  if (S.stageIdx===0) renderStage1(area);
  else if (S.stageIdx===1) renderStage2(area);
  else if (S.stageIdx===2) renderStage3(area);
  else if (S.stageIdx===3) renderStage4(area);
  else renderStage5(area);
}

/* ═══════════════════════════════════════
   1단계 — PNG 레이어 애니메이션 씬 + TTS
   청크 이동 시 이전 액터 완전 제거 후 새 씬 등장
═══════════════════════════════════════ */
function renderStage1(area) {
  const v = VERSES[S.verseIdx];
  const chunk = v.chunks[S.chunkIdx];
  const isLast = S.chunkIdx === v.chunks.length-1;
  const isFirst = S.chunkIdx === 0;

  const allText = v.chunks.map((ch,ci) => {
    const cls = ci===S.chunkIdx ? 'chunk-highlight' : 'chunk-dim';
    return `${ch.verseNum?`<span class="vnum">${ch.verseNum}</span>`:''}<span class="${cls}">${ch.text}</span>`;
  }).join(' ');

  const dotsHtml = v.chunks.map((_,i) =>
    `<div class="pdot${i<S.chunkIdx?' done':i===S.chunkIdx?' current':''}"></div>`
  ).join('');

  area.innerHTML = `
    <div class="scene-stage" id="scene-stage"></div>
    <div class="card" style="margin-top:10px">
      <div class="card-label">전체 구절</div>
      <div style="font-size:calc(13px*var(--fs,1));line-height:2;color:var(--text-dim)">${allText}</div>
    </div>
    <div class="progress-info">
      ${S.chunkIdx+1} / ${v.chunks.length}
      <div class="progress-dots">${dotsHtml}</div>
    </div>
    <div class="spacer"></div>`;

  renderScene(chunk);

  prepareTTS(chunk.text);
  document.getElementById('btn-prev').disabled = isFirst;
  document.getElementById('btn-main').textContent = isLast ? '다음 단계 →' : '다음 ▶';
  document.getElementById('btn-main').className = isLast ? 'btn-main gold' : 'btn-main';
}

/* 여러 청크의 씬을 하나로 합쳐 렌더 (4·5단계 그림 힌트)
   같은 이미지는 첫 등장 좌표로 1회만 표시해 화면이 덜 복잡하게 */
function renderSceneMulti(chunks) {
  const stage = document.getElementById('scene-stage');
  if (!stage) return;
  stage.innerHTML = '';
  const seen = new Set();
  const queue = [];
  chunks.forEach(chunk => {
    if (!chunk.scene) return;
    chunk.scene.forEach(actor => {
      if (seen.has(actor.img)) return;
      seen.add(actor.img);
      queue.push(actor);
    });
  });
  queue.forEach((actor, i) => {
    const img = document.createElement('img');
    img.className = 'scene-actor';
    img.src = `/images/${actor.img}`;
    img.alt = '';
    img.style.left = actor.x;
    img.style.top = actor.y;
    img.style.width = actor.size + 'px';
    img.style.height = actor.size + 'px';
    img.style.opacity = '0';
    const animName = (actor.anim === 'moveTo') ? 'fadeUp' : actor.anim;
    img.style.animation = `${animName} 0.5s ease ${i * 0.12}s forwards`;
    img.onerror = () => { img.style.display = 'none'; };
    stage.appendChild(img);
  });
}

/* PNG 레이어 씬 렌더 — 매 청크마다 stage 초기화 후 새 액터 애니메이션 등장 */
function renderScene(chunk) {
  const stage = document.getElementById('scene-stage');
  if (!stage) return;

  stage.innerHTML = ''; // 이전 청크 액터 완전 제거

  if (!chunk.scene) return;

  chunk.scene.forEach(actor => {
    const img = document.createElement('img');
    img.className = 'scene-actor';
    img.src = `/images/${actor.img}`;
    img.alt = '';
    img.style.left = actor.x;
    img.style.top = actor.y;
    img.style.width = actor.size + 'px';
    img.style.height = actor.size + 'px';
    img.style.opacity = '0';
    // moveTo는 이전 액터가 없으므로 fadeUp 으로 fallback
    const animName = (actor.anim === 'moveTo') ? 'fadeUp' : actor.anim;
    img.style.animation = `${animName} 0.6s ease ${actor.delay || 0}s forwards`;
    img.onerror = () => { img.style.display = 'none'; };
    stage.appendChild(img);
  });
}

/* ═══════════════════════════════════════
   2단계 — 전체 장(chapter) 한 번에 표시
   힌트 5초간 빈칸 자리에 단어가 fade-in/sudden-disappear 반복
   → 입력 phase 전환 → 모두 정답 → 라운드 완료
   3 라운드 완료 시 3단계 잠금 해제
═══════════════════════════════════════ */
function renderStage2(area) {
  const v = VERSES[S.verseIdx];
  const groups = getVerseGroups(v);
  const blankSet = new Set(S.s2_blankIndices.map(b => `${b.ci}-${b.wi}`));

  // 절(verseNum) 단위로 묶어서 표시
  const groupsHtml = groups.map(g => {
    const versesText = g.chunks.map(ch => {
      const ci = v.chunks.indexOf(ch);
      const words = ch.text.split(' ');
      return words.map((w, wi) => {
        if (blankSet.has(`${ci}-${wi}`)) {
          if (S.s2_hintPhase) {
            return `<span class="word-bubble blinking" data-ci="${ci}" data-wi="${wi}">` +
              `<span class="bubble-text">${w}</span></span>`;
          }
          return `<span class="word-bubble" data-ci="${ci}" data-wi="${wi}">` +
            `<input class="bubble-input" type="text" data-ci="${ci}" data-wi="${wi}" ` +
            `style="width:${charWidth(w)}" ` +
            `autocomplete="off" autocorrect="off" spellcheck="false"></span>`;
        }
        return `<span>${w}</span>`;
      }).join(' ');
    }).join(' ');

    return `<div class="s2-verse-group">
      <div class="s2-vnum">${g.verseNum}</div>
      <div class="s2-verse-text">${versesText}</div>
    </div>`;
  }).join('');

  // 라운드 진행 점
  let dotsHtml = '';
  for (let i = 0; i < S.s2_targetRounds; i++) {
    let cls = 'round-dot';
    if (i < S.s2_totalRounds) cls += ' done';
    else if (i === S.s2_totalRounds) cls += ' current';
    dotsHtml += `<div class="${cls}"></div>`;
  }

  const guideHtml = S.s2_hintPhase
    ? `<div class="s2-guide" id="s2-guide">👀 깜빡이는 단어를 외운 뒤 [도전!] 을 누르세요</div>`
    : `<div class="s2-guide input-mode" id="s2-guide">빈칸을 채워주세요 ✏️</div>`;

  const sceneHtml = S.s2_hintVisible
    ? `<div class="scene-stage" id="scene-stage"></div>`
    : '';
  const toggleHtml = `<button class="hint-toggle${S.s2_hintVisible?' on':''}" type="button" onclick="toggleS2Hint()">${S.s2_hintVisible?'🙈 그림 가리기':'💡 그림 힌트 보기'}</button>`;

  area.innerHTML = `
    ${sceneHtml}
    ${toggleHtml}
    <div class="card" style="margin-top:8px">
      ${groupsHtml}
    </div>
    ${guideHtml}
    <div class="progress-info">
      라운드 ${S.s2_totalRounds + 1}/${S.s2_targetRounds}
      <div class="round-dots">${dotsHtml}</div>
    </div>
    <div class="spacer"></div>`;

  if (S.s2_hintVisible && S.s2_hintChunkIdx >= 0) {
    renderScene(v.chunks[S.s2_hintChunkIdx]);
  }

  const btn = document.getElementById('btn-main');
  btn.style.display = '';
  if (S.s2_hintPhase) {
    btn.textContent = '도전! ✨';
    btn.className = 'btn-main gold';
  } else {
    btn.textContent = '확인';
    btn.className = 'btn-main';
    setupS2InputHandlers();
  }
}

window.toggleS2Hint = function() {
  S.s2_hintVisible = !S.s2_hintVisible;
  const toggleBtn = document.querySelector('.hint-toggle');
  if (S.s2_hintVisible) {
    let stage = document.getElementById('scene-stage');
    if (!stage) {
      stage = document.createElement('div');
      stage.className = 'scene-stage';
      stage.id = 'scene-stage';
      const area = document.getElementById('scroll-area');
      // 토글 버튼 위에 삽입
      area.insertBefore(stage, area.firstChild);
    }
    const v = VERSES[S.verseIdx];
    const ci = S.s2_hintChunkIdx >= 0 ? S.s2_hintChunkIdx
             : (S.s2_blankIndices[0]?.ci ?? 0);
    S.s2_hintChunkIdx = ci;
    renderScene(v.chunks[ci]);
    if (toggleBtn) {
      toggleBtn.textContent = '🙈 그림 가리기';
      toggleBtn.classList.add('on');
    }
  } else {
    const stage = document.getElementById('scene-stage');
    if (stage) stage.remove();
    if (toggleBtn) {
      toggleBtn.textContent = '💡 그림 힌트 보기';
      toggleBtn.classList.remove('on');
    }
  }
};

function switchToInputPhase() {
  S.s2_hintPhase = false;
  const v = VERSES[S.verseIdx];

  // 각 .word-bubble 안의 텍스트 → input으로 교체 (ci/wi 기반)
  document.querySelectorAll('.word-bubble').forEach(bubble => {
    const ci = parseInt(bubble.dataset.ci, 10);
    const wi = parseInt(bubble.dataset.wi, 10);
    const word = v.chunks[ci].text.split(' ')[wi];
    bubble.classList.remove('blinking');
    bubble.innerHTML = `<input class="bubble-input" type="text" data-ci="${ci}" data-wi="${wi}" ` +
      `style="width:${charWidth(word)}" ` +
      `autocomplete="off" autocorrect="off" spellcheck="false">`;
  });

  const guideEl = document.getElementById('s2-guide');
  if (guideEl) {
    guideEl.textContent = '빈칸을 채워주세요 ✏️';
    guideEl.classList.add('input-mode');
  }

  const btn = document.getElementById('btn-main');
  btn.style.display = '';
  btn.textContent = '확인';
  btn.className = 'btn-main';

  setupS2InputHandlers();
}

function setupS2InputHandlers() {
  const inputs = Array.from(document.querySelectorAll('.bubble-input'));
  const v = VERSES[S.verseIdx];
  const expectedOf = (input) => {
    const ci = parseInt(input.dataset.ci, 10);
    const wi = parseInt(input.dataset.wi, 10);
    return v.chunks[ci].text.split(' ')[wi];
  };

  inputs.forEach((input, i) => {
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        const next = inputs.slice(i + 1).find(n => !n.disabled);
        if (next) next.focus();
        else onMain();
      }
    });

    // 한 글자씩 입력될 때마다 즉시 정답 검사 (한칸씩 즉시 피드백)
    input.addEventListener('input', () => {
      if (input.disabled) return;
      const bubble = input.closest('.word-bubble');
      const val = normalize(input.value);
      const expected = expectedOf(input);
      // 다시 타이핑 시작 → wrong 표시 + 정답 힌트 제거
      if (input.classList.contains('wrong')) {
        input.classList.remove('wrong');
        bubble?.classList.remove('wrong');
        removeBubbleAnswerHint(bubble);
      }
      // 정확히 일치 → 즉시 정답 처리 + 다음 빈칸으로 자동 이동
      // (자동 라운드 완료는 하지 않음 — 사용자가 [확인] 을 눌러야 함)
      if (val === expected) {
        input.classList.add('correct');
        input.disabled = true;
        bubble?.classList.add('correct');
        removeBubbleAnswerHint(bubble);
        const next = inputs.slice(i + 1).find(n => !n.disabled);
        next?.focus();
      }
    });

    // 빈칸을 떠나는데 비어있지 않고 틀린 값이면 wrong 표시
    input.addEventListener('blur', () => {
      if (input.disabled) return;
      const val = normalize(input.value);
      if (val && val !== expectedOf(input)) {
        const bubble = input.closest('.word-bubble');
        input.classList.add('wrong');
        bubble?.classList.add('wrong');
        addBubbleAnswerHint(bubble, expectedOf(input));
      }
    });

    // 포커스 변경 시 힌트 씬도 해당 청크로 갱신
    input.addEventListener('focus', () => {
      const ci = parseInt(input.dataset.ci, 10);
      if (Number.isFinite(ci) && S.s2_hintChunkIdx !== ci) {
        S.s2_hintChunkIdx = ci;
        if (S.s2_hintVisible) {
          renderScene(v.chunks[ci]);
        }
      }
    });
  });
  if (inputs[0]) inputs[0].focus();
}

function completeS2Round() {
  S.stageCorrect++;
  S.streak++;
  updateStats();
  S.s2_totalRounds++;
  if (S.s2_totalRounds < S.s2_targetRounds) {
    showReviewBanner();
    setTimeout(() => {
      nextS2();
      hideFeedback();
      renderStage();
    }, 1000);
  } else {
    setTimeout(() => unlockStage(2), 800);
  }
}

function showReviewBanner() {
  const banner = document.createElement('div');
  banner.className = 'review-banner';
  banner.textContent = '복습!! 🎉';
  document.body.appendChild(banner);
  setTimeout(() => banner.remove(), 1000);
}

function checkStage2() {
  // 힌트 phase 에서 누르면 빈칸 phase 로 전환 (사용자 페이스)
  if (S.s2_hintPhase) { switchToInputPhase(); return; }
  const v = VERSES[S.verseIdx];
  const inputs = Array.from(document.querySelectorAll('.bubble-input'));
  if (inputs.length === 0) return;

  let allCorrect = true;
  let newlyCorrect = 0;
  inputs.forEach(input => {
    const bubble = input.closest('.word-bubble');
    if (input.disabled) return; // 이전에 정답 처리됨
    const ci = parseInt(input.dataset.ci, 10);
    const wi = parseInt(input.dataset.wi, 10);
    const answer = v.chunks[ci].text.split(' ')[wi];
    const val = normalize(input.value);
    if (val === answer) {
      input.classList.remove('wrong');
      input.classList.add('correct');
      input.disabled = true;
      bubble?.classList.remove('wrong');
      bubble?.classList.add('correct');
      removeBubbleAnswerHint(bubble);
      newlyCorrect++;
    } else {
      allCorrect = false;
      input.classList.add('wrong');
      bubble?.classList.add('wrong');
      addBubbleAnswerHint(bubble, answer);
      // 사용자가 다시 입력하면 'input' 이벤트로 wrong 클래스 + 힌트 제거됨 (값은 유지)
    }
  });

  S.s2_roundCorrect += newlyCorrect;

  if (allCorrect) {
    completeS2Round();
  } else {
    S.streak = 0;
    updateStats();
    setTimeout(() => {
      const firstEmpty = inputs.find(i => !i.disabled);
      firstEmpty?.focus();
    }, 400);
  }
}

/* ═══════════════════════════════════════
   3단계 — 랜덤 청크 단어 단위 빈칸 + 그림 힌트 토글
═══════════════════════════════════════ */
function renderStage3(area) {
  const v = VERSES[S.verseIdx];
  const chunk = v.chunks[S.s3_curChunkIdx];

  const groups = getVerseGroups(v);
  let curGroup = null;
  let curIdxInGroup = -1;
  for (const g of groups) {
    const idx = g.chunks.indexOf(chunk);
    if (idx >= 0) { curGroup = g; curIdxInGroup = idx; break; }
  }

  const chapterPart = v.title.split(' ').slice(0, 2).join(' ');
  const fullRef = curGroup ? `${chapterPart} ${curGroup.verseNum}` : v.title;

  // 같은 절의 다른 청크들은 맥락으로, 현재 청크는 단어 단위 말풍선
  // 힌트 phase: 단어가 깜빡이며 보임 / 입력 phase: 빈칸 input
  const contextHtml = curGroup ? curGroup.chunks.map((ch, idx) => {
    if (idx === curIdxInGroup) {
      const wordsHtml = ch.text.split(' ').map((w, wi) => {
        if (S.s3_hintPhase) {
          return `<span class="word-bubble blinking" data-wi="${wi}">` +
            `<span class="bubble-text">${w}</span></span>`;
        }
        return `<span class="word-bubble" data-wi="${wi}">` +
          `<input class="bubble-input" type="text" data-wi="${wi}" ` +
          `style="width:${charWidth(w)}" ` +
          `autocomplete="off" autocorrect="off" spellcheck="false">` +
        `</span>`;
      }).join(' ');
      return `<div style="margin:8px 0;padding:10px 12px;background:var(--deep3);border-radius:10px;line-height:2.4;font-size:calc(14px*var(--fs,1))">${wordsHtml}</div>`;
    }
    return `<div style="font-size:calc(13px*var(--fs,1));color:var(--text-muted);padding:5px 4px;line-height:1.7;border-left:2px solid var(--deep3);padding-left:10px;margin:4px 0">${ch.text}</div>`;
  }).join('') : '';

  const guideHtml = S.s3_hintPhase
    ? `<div class="s2-guide" id="s3-guide">👀 깜빡이는 단어를 외운 뒤 [도전!] 을 누르세요</div>`
    : `<div class="s2-guide input-mode" id="s3-guide">빈칸을 채워주세요 ✏️</div>`;

  const progressHtml = `<div class="progress-info">${S.s3_correct}/${S.s3_target} 정답 완료</div>`;

  const sceneHtml = S.s3_hintVisible
    ? `<div class="scene-stage" id="scene-stage"></div>`
    : '';
  const toggleHtml = `<button class="hint-toggle${S.s3_hintVisible?' on':''}" type="button" onclick="toggleS3Hint()">${S.s3_hintVisible?'🙈 그림 가리기':'💡 그림 힌트 보기'}</button>`;

  area.innerHTML = `
    ${sceneHtml}
    ${toggleHtml}
    <div class="card" style="margin-top:8px">
      <div style="padding:4px 0">
        <div style="margin-bottom:10px;display:flex;align-items:center;gap:8px;flex-wrap:wrap">
          <span class="vnum" style="font-size:12px;background:var(--purple);color:#fff;padding:3px 8px">${fullRef}</span>
          <span style="font-size:11px;color:var(--text-muted)">${curIdxInGroup+1}/${curGroup?.chunks.length||1} 청크</span>
        </div>
        ${contextHtml}
      </div>
    </div>
    ${guideHtml}
    ${progressHtml}
    <div class="spacer"></div>`;

  if (S.s3_hintVisible) {
    renderScene(chunk);
  }

  const btn = document.getElementById('btn-main');
  if (S.s3_hintPhase) {
    btn.textContent = '도전! ✨';
    btn.className = 'btn-main gold';
  } else {
    btn.textContent = '확인';
    btn.className = 'btn-main';
    setupS3InputHandlers();
  }
}

function switchToS3InputPhase() {
  S.s3_hintPhase = false;
  const v = VERSES[S.verseIdx];
  const chunk = v.chunks[S.s3_curChunkIdx];
  const words = chunk.text.split(' ');

  document.querySelectorAll('.word-bubble').forEach(bubble => {
    const wi = parseInt(bubble.dataset.wi, 10);
    if (!Number.isFinite(wi)) return;
    const word = words[wi];

function completeS3Chunk() {

  if (S.s3_correct >= S.s3_target) {

}

function setupS3InputHandlers() {
  const inputs = Array.from(document.querySelectorAll('.bubble-input'));
  const v = VERSES[S.verseIdx];
  const words = v.chunks[S.s3_curChunkIdx].text.split(' ');

    input.addEventListener('keydown', (e) => {

        if (next) next.focus();
        else onMain();
      }
    });

    input.addEventListener('input', () => {

      if (input.classList.contains('wrong')) {

      }
      // (자동 진행 안 함 — 사용자가 [확인] 을 눌러야 다음 청크로)

        input.classList.add('correct');

  S.s3_hintVisible = !S.s3_hintVisible;
  const toggleBtn = document.querySelector('.hint-toggle');
  if (S.s3_hintVisible) {
    let stage = document.getElementById('scene-stage');
    if (!stage) {

    renderScene(v.chunks[S.s3_curChunkIdx]);
    if (toggleBtn) {
      toggleBtn.textContent = '🙈 그림 가리기';
      toggleBtn.classList.add('on');
    }
  } else {
    const stage = document.getElementById('scene-stage');
    if (stage) stage.remove();
    if (toggleBtn) {
      toggleBtn.textContent = '💡 그림 힌트 보기';
      toggleBtn.classList.remove('on');
    }
  }
};

function checkStage3() {
  // 힌트 phase 에서 누르면 빈칸 phase 로 전환
  if (S.s3_hintPhase) { switchToS3InputPhase(); return; }

  const v = VERSES[S.verseIdx];
  const chunk = v.chunks[S.s3_curChunkIdx];
  const words = chunk.text.split(' ');
  const inputs = Array.from(document.querySelectorAll('.bubble-input'));
  if (inputs.length === 0) return;

  let allCorrect = true;
  inputs.forEach(input => {
    const bubble = input.closest('.word-bubble');
    if (input.disabled) return;
    const wi = parseInt(input.dataset.wi, 10);
    const answer = words[wi];
    const val = normalize(input.value);
    if (val === answer) {
      input.classList.remove('wrong');
      input.classList.add('correct');
      input.disabled = true;
      bubble?.classList.remove('wrong');
      bubble?.classList.add('correct');
      removeBubbleAnswerHint(bubble);
    } else {
      allCorrect = false;
      input.classList.add('wrong');
      bubble?.classList.add('wrong');
      addBubbleAnswerHint(bubble, answer);
    }
  });

  if (allCorrect) {
    completeS3Chunk();
  } else {
    S.streak = 0;
    updateStats();
    showFeedback('wrong', '✗ 빨간 빈칸을 다시 확인하세요');
    setTimeout(() => {
      const firstWrong = inputs.find(i => i.classList.contains('wrong'));
      firstWrong?.focus();
      hideFeedback();
    }, 1200);
  }
}

/* ═══════════════════════════════════════
   4단계 — 절 단위 전체 입력 + 그림 힌트 토글
═══════════════════════════════════════ */
function renderStage4(area) {
  const groups = S.s4_verseGroups;
  const cur = S.s4_groupIdx;
  const g = groups[cur];

  // 한 절씩 진행 — 완료한 절(텍스트) + 현재 절(깜빡임 평문 → 밑줄 빈칸). 다음 절은 아직 안 보임.
  const blocksHtml = groups.map((grp, gi) => {
    if (gi > cur) return '';
    const isDone = S.s4_done.has(gi);
    const fullText = grp.chunks.map(ch=>ch.text).join(' ');
    let body;
    if (isDone) {
      body = `<div class="verse-done-text">${fullText}</div>`;
    } else if (S.s4_hintPhase) {
      body = `<div class="verse-hint-line blink-line-4">${fullText}</div>`;
    } else {
      body = `<textarea class="verse-lined" data-gi="${gi}" rows="1" placeholder="이 절을 입력하세요 (띄어쓰기는 달라도 됩니다)" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>`;
    }
    return `<div class="verse-block">
      <div class="verse-block-label">
        <span class="vnum" style="font-size:12px">${grp.verseNum}</span>
      </div>
      ${body}
    </div>`;
  }).join('');

  const sceneHtml = S.s4_hintVisible
    ? `<div class="scene-stage" id="scene-stage"></div>`
    : '';
  const toggleHtml = `<button class="hint-toggle${S.s4_hintVisible?' on':''}" type="button" onclick="toggleS4Hint()">${S.s4_hintVisible?'🙈 그림 가리기':'💡 그림 힌트 보기'}</button>`;

  area.innerHTML = `
    ${sceneHtml}
    ${toggleHtml}
    <div class="verse-progress">${cur+1} / ${groups.length} 절</div>
    <div class="card">${blocksHtml}</div>
    <div class="spacer"></div>`;

  if (S.s4_hintVisible && g) renderSceneMulti(g.chunks);

  const btn = document.getElementById('btn-main');
  if (S.s4_hintPhase) {
    btn.textContent = '도전! ✨';
    btn.className = 'btn-main gold';
  } else {
    btn.textContent = '확인';
    btn.className = 'btn-main';
    setupS4InputHandlers();
  }
}

function switchToS4InputPhase() {
  S.s4_hintPhase = false;
  renderStage();
}

function setupS4InputHandlers() {
  const ta = document.querySelector(`.verse-lined[data-gi="${S.s4_groupIdx}"]`);
  if (!ta) return;
  autoResize(ta);
  ta.addEventListener('input', () => {
    autoResize(ta);
    ta.classList.remove('wrong');
    removeAnswerDiff();
  });

}

window.toggleS4Hint = function() {

    let stage = document.getElementById('scene-stage');
    if (!stage) {
      stage = document.createElement('div');
      stage.className = 'scene-stage';
      stage.id = 'scene-stage';
      const area = document.getElementById('scroll-area');
      area.insertBefore(stage, area.firstChild);
    }
    const g = S.s4_verseGroups[S.s4_groupIdx];
    if (g) renderSceneMulti(g.chunks);
    if (toggleBtn) {
      toggleBtn.textContent = '🙈 그림 가리기';
      toggleBtn.classList.add('on');
    }
  } else {
    const stage = document.getElementById('scene-stage');
    if (stage) stage.remove();
    if (toggleBtn) {

      toggleBtn.classList.remove('on');
    }
  }
};

window.autoResize = function(el) {
  el.style.height='auto';
  el.style.height=el.scrollHeight+'px';
};

function checkStage4() {
  if (S.s4_hintPhase) { switchToS4InputPhase(); return; }

  const v = VERSES[S.verseIdx];
  const groups = S.s4_verseGroups;
  const gi = S.s4_groupIdx;
  const ta = document.querySelector(`.verse-lined[data-gi="${gi}"]`);
  if (!ta) return;

  // 띄어쓰기 무시 — 글자만 맞으면 정답
  const answer = normalizeNoSpace(groups[gi].chunks.map(ch=>ch.text).join(' '));
  const val = normalizeNoSpace(ta.value);

  if (val && val === answer) {
    ta.classList.remove('wrong');
    ta.classList.add('correct');
    ta.disabled = true;
    removeAnswerDiff();
    S.s4_done.add(gi);
    S.stageCorrect++; S.streak++;
    updateStats();
    if (S.s4_done.size === groups.length) {
      saveScore(v.id, {stage4done:true, stage:4});
      showFeedback('correct','✓ 모든 절 완료! 전체 암기로 이동합니다.');
      setTimeout(()=>{ window.selectStage(4); }, 1200);
    } else {
      S.s4_groupIdx++;
      S.s4_hintPhase = true; // 다음 절은 깜빡임부터
      showFeedback('correct','✓ 정답! 다음 절로 →');
      setTimeout(()=>{ hideFeedback(); renderStage(); }, 1100);
    }
  } else {
    S.streak = 0;
    updateStats();
    ta.classList.add('wrong');
    const rawAnswer = groups[gi].chunks.map(ch=>ch.text).join(' ');
    showAnswerDiff(ta, rawAnswer, ta.value);
    showFeedback('wrong','✗ 빨간 글자가 틀렸어요. 다시 입력하면 사라집니다');
    setTimeout(() => { hideFeedback(); }, 2000);
  }
}

/* ═══════════════════════════════════════
   5단계 — 전체 한번에 + 그림 힌트 토글 (포커스 절 따라 갱신)
═══════════════════════════════════════ */
function renderStage5(area) {
  const v = VERSES[S.verseIdx];
  const groups = getVerseGroups(v);

  // 힌트 phase: 전체를 깜빡이는 평문(타원 없음)으로 표시
  // 입력 phase: 전체를 하나의 밑줄 빈칸에 처음부터 끝까지 쭉 입력
  const fullText = v.chunks.map(ch=>ch.text).join(' ');
  let bodyHtml;
  if (S.s5_hintPhase) {
    bodyHtml = `<div class="verse-hint-line blink-line-5">${fullText}</div>`;
  } else {
    bodyHtml = `<textarea class="verse-lined" id="s5-textarea" rows="6" placeholder="전체 구절을 처음부터 끝까지 입력하세요 (띄어쓰기는 달라도 됩니다)" autocomplete="off" autocorrect="off" spellcheck="false"></textarea>`;
  }

  const sceneHtml = S.s5_hintVisible
    ? `<div class="scene-stage" id="scene-stage"></div>`
    : '';
  const toggleHtml = `<button class="hint-toggle${S.s5_hintVisible?' on':''}" type="button" onclick="toggleS5Hint()">${S.s5_hintVisible?'🙈 그림 가리기':'💡 그림 힌트 보기'}</button>`;

  area.innerHTML = `
    ${sceneHtml}
    ${toggleHtml}
    <div class="card" style="margin-top:8px">${bodyHtml}</div>
    <div class="spacer"></div>`;

  if (S.s5_hintVisible) {
    renderSceneMulti(v.chunks);
  }

  const btn5 = document.getElementById('btn-main');
  if (S.s5_hintPhase) {
    btn5.textContent = '도전! ✨';
    btn5.className = 'btn-main gold';
  } else {
    btn5.textContent = '전체 확인';
    btn5.className = 'btn-main gold';
    setupS5InputHandlers();
  }
}

function switchToS5InputPhase() {
  S.s5_hintPhase = false;
  renderStage();
}

function setupS5InputHandlers() {
  const ta = document.getElementById('s5-textarea');
  if (!ta) return;
  autoResize(ta);
  ta.addEventListener('input', () => {
    autoResize(ta);
    ta.classList.remove('wrong');
    removeAnswerDiff();
  });
  ta.focus();
}

window.toggleS5Hint = function() {
  S.s5_hintVisible = !S.s5_hintVisible;
  const toggleBtn = document.querySelector('.hint-toggle');
  if (S.s5_hintVisible) {
    let stage = document.getElementById('scene-stage');
    if (!stage) {
      stage = document.createElement('div');
      stage.className = 'scene-stage';
      stage.id = 'scene-stage';
      const area = document.getElementById('scroll-area');
      area.insertBefore(stage, area.firstChild);
    }
    renderSceneMulti(VERSES[S.verseIdx].chunks);
    if (toggleBtn) {
      toggleBtn.textContent = '🙈 그림 가리기';
      toggleBtn.classList.add('on');
    }
  } else {
    const stage = document.getElementById('scene-stage');
    if (stage) stage.remove();
    if (toggleBtn) {
      toggleBtn.textContent = '💡 그림 힌트 보기';
      toggleBtn.classList.remove('on');
    }
  }
};

function checkStage5() {
  if (S.s5_hintPhase) { switchToS5InputPhase(); return; }

  const v = VERSES[S.verseIdx];
  const ta = document.getElementById('s5-textarea');
  if (!ta) return;

  // 전체 구절 — 띄어쓰기 무시하고 글자만 비교
  const answer = normalizeNoSpace(v.chunks.map(ch=>ch.text).join(' '));
  const val = normalizeNoSpace(ta.value);

  if (val && val === answer) {
    ta.classList.remove('wrong');
    ta.classList.add('correct');
    ta.disabled = true;
    removeAnswerDiff();
    S.stageCorrect++; S.streak++;
    S.mastered.add(v.id);
    updateStats();
    saveScore(v.id, {mastered:true, masteredAt:new Date().toISOString(), stage5done:true});
    renderVerseTabs();
    showComplete();
  } else {
    S.streak = 0;
    updateStats();
    ta.classList.add('wrong');
    const rawAnswer = v.chunks.map(ch=>ch.text).join(' ');
    showAnswerDiff(ta, rawAnswer, ta.value);
    showFeedback('wrong','✗ 빨간 글자가 틀렸어요. 다시 입력하면 사라집니다');
    setTimeout(() => { hideFeedback(); }, 2000);
  }
}

/* ═══════════════════════════════════════
   단계 잠금 해제
═══════════════════════════════════════ */
function unlockStage(next) {
  S.stageUnlocked[next]=true;
  const v = VERSES[S.verseIdx];
  saveScore(v.id, {['stage'+next+'done']:true, stage:next});
  showFeedback('correct', `✓ ${next}단계 잠금 해제! 다음 단계로 진행합니다.`);
  setTimeout(()=>{ window.selectStage(next); }, 1200);
}

/* ═══════════════════════════════════════
   완료 화면
═══════════════════════════════════════ */
function showComplete() {
  const v = VERSES[S.verseIdx];
  document.getElementById('scroll-area').innerHTML = `
    <div class="complete-screen">
      <div class="complete-icon">🎊</div>
      <div class="complete-title">${v.title}<br>완전 암기!</div>
      <div style="font-size:13px;color:var(--text-dim);margin-top:8px;margin-bottom:24px">
        5단계를 모두 완료했습니다
      </div>
      ${S.mastered.size===VERSES.length
        ? `<div style="font-size:16px;color:var(--gold-light);margin-bottom:16px">🏆 전체 ${VERSES.length}구절 완전 암기 달성!</div>`
        : ''
      }
      <a href="dashboard.html" style="display:block;padding:13px 28px;background:linear-gradient(135deg,var(--gold),#a07830);border-radius:12px;color:#1a1200;font-weight:700;text-decoration:none;font-size:15px;text-align:center;margin-bottom:10px">대시보드 보기 →</a>
      <button onclick="selectVerse(${(S.verseIdx+1)%VERSES.length})" style="width:100%;padding:11px;background:none;border:1px solid var(--card-border);border-radius:12px;color:var(--text-dim);font-size:14px;cursor:pointer">다음 구절 →</button>
    </div>`;
  document.getElementById('tts-bar').style.display='none';
  document.getElementById('bottom-nav').style.display='none';
}

/* ═══════════════════════════════════════
   TTS
═══════════════════════════════════════ */
function prepareTTS(text) {
  stopTTS();
  if (!('speechSynthesis' in window)) return;
  const utter = new SpeechSynthesisUtterance(text);
  utter.lang='ko-KR';
  utter.rate=parseFloat(document.getElementById('tts-speed')?.value||1);
  utter.onstart=()=>{ S.ttsPlaying=true; document.getElementById('tts-btn').textContent='⏸'; };
  utter.onend=()=>{ S.ttsPlaying=false; document.getElementById('tts-btn').textContent='▶'; document.getElementById('tts-fill').style.width='100%'; };
  utter.onboundary=(e)=>{ if(utter.text) document.getElementById('tts-fill').style.width=Math.round(e.charIndex/utter.text.length*100)+'%'; };
  S.ttsUtter=utter;
  // 자동재생 안 함 — 사용자가 ▶ 버튼을 눌러야 재생됨
  const fill=document.getElementById('tts-fill'); if(fill) fill.style.width='0%';
  const btn=document.getElementById('tts-btn'); if(btn) btn.textContent='▶';
}
window.toggleTTS=function(){
  if(!S.ttsUtter) return;
  if(S.ttsPlaying){speechSynthesis.pause();S.ttsPlaying=false;document.getElementById('tts-btn').textContent='▶';}
  else if(speechSynthesis.paused){speechSynthesis.resume();S.ttsPlaying=true;document.getElementById('tts-btn').textContent='⏸';}
  else{speechSynthesis.speak(S.ttsUtter);}
};
window.changeTTSSpeed=function(){
  if(S.ttsUtter){S.ttsUtter.rate=parseFloat(document.getElementById('tts-speed').value);}
};
function stopTTS(){
  if('speechSynthesis' in window) speechSynthesis.cancel();
  S.ttsPlaying=false; S.ttsUtter=null;
}

/* ═══════════════════════════════════════
   버튼 핸들러
═══════════════════════════════════════ */
window.onMain = function() {
  if (S.stageIdx===0) {
    const v=VERSES[S.verseIdx];
    if (S.chunkIdx < v.chunks.length-1) {
      S.chunkIdx++;
      stopTTS();
      renderStage();
    } else {
      S.stageUnlocked[2]=true;
      saveScore(VERSES[S.verseIdx].id,{stage1done:true});
      showFeedback('correct','✓ 연상 완료! 단어 채우기로 이동합니다.');
      setTimeout(()=>{ window.selectStage(1); },1000);
    }
  } else if (S.stageIdx===1) checkStage2();
  else if (S.stageIdx===2) checkStage3();
  else if (S.stageIdx===3) checkStage4();
  else checkStage5();
};

window.onPrev = function() {
  if (S.stageIdx===0 && S.chunkIdx>0) {
    S.chunkIdx--;
    stopTTS();
    renderStage();
  }
};

window.onReplay = function() {
  if (S.stageIdx!==0) return;
  const v = VERSES[S.verseIdx];
  prepareTTS(v.chunks[S.chunkIdx].text);
};

/* 초기화 */
S.chunkIdx=0;
initStage();
renderAll();
</script>
</body>
