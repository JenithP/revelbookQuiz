services:
  - type: web
    name: revelation-bot
    env: python
    plan: free        
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.7
      - key: TELEGRAM_TOKEN
        sync: false
      - key: FIREBASE_KEY_JSON
        sync: false
      - key: WEBAPP_URL
        sync: false
