<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>내 현황 · 대시보드</title>
<link href="https://fonts.googleapis.com/css2?family=Nanum+Myeongjo:wght@400;700;800&family=Pretendard:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --gold:#c9a84c;--gold-light:#e8cc80;
  --deep:#0d0a1a;--deep2:#130f24;--deep3:#1c1535;
  --purple:#4a3b8c;--purple-light:#7b6abf;--purple-bright:#9d8fe0;
  --teal:#2a8c7a;--teal-light:#4dbda8;
  --text:#f0ece0;--text-dim:#9e96b8;--text-muted:#5a5275;
  --card-bg:#13102a;--card-border:rgba(255,255,255,.07);
}
html,body{height:100%}
body{
  font-family:'Pretendard',sans-serif;
  background:var(--deep);color:var(--text);
  max-width:420px;margin:0 auto;
  min-height:100vh;
}
.header{
  background:var(--deep2);border-bottom:1px solid var(--card-border);
  padding:12px 16px;display:flex;align-items:center;gap:10px;
  position:sticky;top:0;z-index:10;
}
.back{
  width:32px;height:32px;display:flex;align-items:center;justify-content:center;
  border:1px solid var(--card-border);border-radius:8px;color:var(--text-dim);
  font-size:16px;text-decoration:none;
}
.header-title{flex:1;font-size:14px;font-weight:600}
.scroll{overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:14px;padding-bottom:40px}

/* 프로필 카드 */
.profile-card{
  background:linear-gradient(135deg,#1c1535,#0f1a38);
  border:1px solid var(--card-border);border-radius:16px;
  padding:20px;display:flex;align-items:center;gap:14px;
}
.avatar{
  width:52px;height:52px;border-radius:14px;flex-shrink:0;
  background:linear-gradient(135deg,var(--purple),var(--purple-light));
  display:flex;align-items:center;justify-content:center;
  font-family:'Nanum Myeongjo',serif;font-size:22px;font-weight:700;color:#fff;
}
.profile-name{font-size:17px;font-weight:600;color:var(--text)}
.profile-group{font-size:12px;color:var(--text-dim);margin-top:2px}
.profile-since{font-size:11px;color:var(--text-muted);margin-top:4px}

/* 통계 그리드 */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.stat-card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:12px;padding:14px;text-align:center;
}
.stat-big{font-size:26px;font-weight:600;color:var(--text);font-family:'Nanum Myeongjo',serif}
.stat-big.gold{color:var(--gold-light)}
.stat-big.teal{color:var(--teal-light)}
.stat-lbl{font-size:11px;color:var(--text-muted);margin-top:4px}

/* 구절별 진도 */
.section-title{font-size:13px;font-weight:600;color:var(--text-dim);margin-bottom:8px;letter-spacing:.3px}
.verse-card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:12px;padding:14px;display:flex;align-items:center;gap:12px;
}
.verse-icon{font-size:20px;flex-shrink:0}
.verse-info{flex:1;min-width:0}
.verse-name{font-size:13px;font-weight:500}
.verse-stage{font-size:11px;color:var(--text-muted);margin-top:2px}
.verse-progress{margin-top:6px;height:4px;background:var(--deep3);border-radius:2px;overflow:hidden}
.verse-prog-fill{height:100%;border-radius:2px;transition:.5s}
.badge{
  flex-shrink:0;padding:3px 8px;border-radius:20px;
  font-size:11px;font-weight:500;
}
.badge.mastered{background:rgba(45,140,120,.2);color:var(--teal-light);border:1px solid rgba(45,140,120,.3)}
.badge.inprog{background:rgba(74,59,140,.2);color:var(--purple-bright);border:1px solid rgba(74,59,140,.3)}
.badge.none{background:var(--deep3);color:var(--text-muted)}

/* 리더보드 */
.rank-card{
  background:var(--card-bg);border:1px solid var(--card-border);
  border-radius:12px;overflow:hidden;
}
.rank-header{
  background:linear-gradient(135deg,#1c1535,#13102a);
  padding:12px 14px;display:flex;align-items:center;gap:8px;
  border-bottom:1px solid var(--card-border);
}
.rank-header span{font-size:13px;font-weight:600}
.rank-row{
  display:flex;align-items:center;gap:10px;
  padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.04);
  transition:.2s;
}
.rank-row:last-child{border-bottom:none}
.rank-row.me{background:rgba(74,59,140,.1);border-left:3px solid var(--purple-bright)}
.rank-num{
  width:24px;text-align:center;font-size:13px;font-weight:600;
  color:var(--text-muted);flex-shrink:0;
}
.rank-num.top{color:var(--gold)}
.rank-avatar{
  width:32px;height:32px;border-radius:8px;
  background:var(--deep3);display:flex;align-items:center;justify-content:center;
  font-size:14px;font-weight:600;color:var(--text-dim);flex-shrink:0;
}
.rank-info{flex:1;min-width:0}
.rank-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.rank-group{font-size:11px;color:var(--text-muted)}
.rank-score{text-align:right;flex-shrink:0}
.rank-mastered{font-size:14px;font-weight:600;color:var(--gold-light)}
.rank-acc{font-size:11px;color:var(--text-muted)}

.empty{text-align:center;color:var(--text-muted);font-size:13px;padding:24px}
.spinner-wrap{text-align:center;padding:24px;color:var(--text-muted);font-size:13px}

.btn-start{
  display:block;width:100%;padding:13px;
  background:linear-gradient(135deg,var(--purple),var(--purple-light));
  border:none;border-radius:12px;
  color:#fff;font-size:14px;font-weight:600;
  text-align:center;text-decoration:none;cursor:pointer;
}
</style>
</head>
<body>

<div class="header">
  <a href="index.html" class="back">‹</a>
  <div class="header-title">내 현황 · 순위</div>
  <button onclick="loadAll()" style="background:none;border:none;color:var(--text-dim);cursor:pointer;font-size:18px">↻</button>
</div>

<div class="scroll" id="content">
  <div class="spinner-wrap">불러오는 중...</div>
</div>

<script type="module">
import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js';
import { getFirestore, doc, getDoc, collection, getDocs, orderBy, query, limit }
  from 'https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js';

const FIREBASE_CONFIG = {
  apiKey: "AIzaSyCQrXxJaiSPF7_Da569LbeJIXBtOMg5UHU",
  authDomain: "revel-quiz.firebaseapp.com",
  projectId: "revel-quiz",
  storageBucket: "revel-quiz.firebasestorage.app",
  messagingSenderId: "984978228798",
  appId: "1:984978228798:web:9d16a9ea1928c8ff7b736f"
};

const app = initializeApp(FIREBASE_CONFIG);
const db = getFirestore(app);

const VERSES = [
  {id:'rev1',label:'계 1장 1~3절',icon:'✝'},
  {id:'rev7',label:'계 7장 1~4절',icon:'🌬'},
  {id:'rev10',label:'계 10장 10~11절',icon:'📖'},
  {id:'rev20',label:'계 20장 4~6절',icon:'👑'},
  {id:'rev22',label:'계 22장 18~19절',icon:'📜'}
];
const STAGE_LABELS = ['–','연상 완료','빈칸 완료','배열 완료','완전 암기 ✓'];

const user = JSON.parse(localStorage.getItem('revel_user') || 'null');
if (!user) { location.href='index.html'; }

window.loadAll = async function() {
  const content = document.getElementById('content');
  content.innerHTML = '<div class="spinner-wrap">불러오는 중...</div>';
  try {
    const [scoreSnap, lbSnap] = await Promise.all([
      getDoc(doc(db,'scores',user.uid)),
      getDocs(query(collection(db,'leaderboard'), orderBy('totalMastered','desc'), orderBy('accuracy','desc'), limit(50)))
    ]);

    const scores = scoreSnap.exists() ? scoreSnap.data() : {};
    const mastered = VERSES.filter(v => scores[v.id]?.mastered).length;
    const totalAtt = Object.values(scores).reduce((a,v)=>a+(v.attempts||0),0);
    const totalCor = Object.values(scores).reduce((a,v)=>a+(v.correct||0),0);
    const acc = totalAtt>0 ? Math.round(totalCor/totalAtt*100) : 0;

    // 리더보드
    const lb = [];
    lbSnap.forEach(d => lb.push({uid:d.id,...d.data()}));
    const myRank = lb.findIndex(r=>r.uid===user.uid) + 1;

    // 구절별 진도
    const verseProgressHtml = VERSES.map(v => {
      const s = scores[v.id];
      const stage = s?.stage || 0;
      const isMastered = s?.mastered;
      const pct = Math.round(stage/4*100);
      return `<div class="verse-card">
        <div class="verse-icon">${v.icon}</div>
        <div class="verse-info">
          <div class="verse-name">${v.label}</div>
          <div class="verse-stage">${STAGE_LABELS[stage]}</div>
          <div class="verse-progress"><div class="verse-prog-fill" style="width:${pct}%;background:${isMastered?'var(--teal)':'var(--purple-bright)'}"></div></div>
        </div>
        <div class="badge ${isMastered?'mastered':stage>0?'inprog':'none'}">${isMastered?'암기완료':stage>0?`${stage}/4단계`:'미시작'}</div>
      </div>`;
    }).join('');

    // 리더보드 행
    const lbHtml = lb.slice(0,20).map((r,i) => {
      const isMe = r.uid === user.uid;
      return `<div class="rank-row ${isMe?'me':''}">
        <div class="rank-num ${i<3?'top':''}">${i===0?'🥇':i===1?'🥈':i===2?'🥉':i+1}</div>
        <div class="rank-avatar">${(r.name||'?')[0]}</div>
        <div class="rank-info">
          <div class="rank-name">${r.name||'?'}${isMe?' 👈':''}</div>
          <div class="rank-group">${r.group||''}</div>
        </div>
        <div class="rank-score">
          <div class="rank-mastered">${r.totalMastered||0}/5</div>
          <div class="rank-acc">${r.accuracy||0}% 정확</div>
        </div>
      </div>`;
    }).join('');

    content.innerHTML = `
      <!-- 프로필 -->
      <div class="profile-card">
        <div class="avatar">${(user.name||'?')[0]}</div>
        <div>
          <div class="profile-name">${user.name}</div>
          <div class="profile-group">${user.group}</div>
          ${myRank>0?`<div class="profile-since">현재 순위 ${myRank}위</div>`:''}
        </div>
      </div>

      <!-- 통계 -->
      <div class="stat-grid">
        <div class="stat-card">
          <div class="stat-big gold">${mastered}<span style="font-size:14px;color:var(--text-dim)">/5</span></div>
          <div class="stat-lbl">완전 암기</div>
        </div>
        <div class="stat-card">
          <div class="stat-big teal">${acc}<span style="font-size:14px;color:var(--text-dim)">%</span></div>
          <div class="stat-lbl">평균 정확도</div>
        </div>
        <div class="stat-card">
          <div class="stat-big">${totalAtt}</div>
          <div class="stat-lbl">총 도전 횟수</div>
        </div>
        <div class="stat-card">
          <div class="stat-big">${myRank>0?myRank+'위':'–'}</div>
          <div class="stat-lbl">전체 순위</div>
        </div>
      </div>

      <!-- 구절별 진도 -->
      <div>
        <div class="section-title">구절별 진도</div>
        ${verseProgressHtml}
      </div>

      <!-- 리더보드 -->
      <div>
        <div class="section-title">전체 순위</div>
        <div class="rank-card">
          <div class="rank-header">
            <span>🏆</span><span>리더보드 TOP 20</span>
          </div>
          ${lb.length>0 ? lbHtml : '<div class="empty">아직 참여자가 없습니다</div>'}
        </div>
      </div>

      <a href="app.html" class="btn-start">암기 훈련 계속하기 →</a>
    `;
  } catch(e) {
    document.getElementById('content').innerHTML = `<div class="empty">데이터를 불러오지 못했습니다<br><small style="color:var(--text-muted)">${e.message}</small></div>`;
  }
};

loadAll();
</script>
</body>
</html>
